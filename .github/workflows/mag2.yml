name: Direct Video Downloader ch

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Video URLs (space or newline separated)"
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Prepare
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl
          mkdir -p downloads

      - name: Download Files
        shell: bash
        run: |
          success=0
          total=0

          while IFS= read -r url; do
            url=$(echo "$url" | xargs)

            [ -z "$url" ] && continue

            total=$((total + 1))

            echo ""
            echo "======================================"
            echo "[$total] Processing:"
            echo "$url"
            echo "======================================"

            filename=$(basename "${url%%\?*}")

            if [[ -z "$filename" || "$filename" == "remote_control.php" ]]; then
              filename="video_${total}.mp4"
            fi

            echo "Filename: $filename"

            http_code=$(curl \
              -L \
              --retry 3 \
              --retry-delay 5 \
              --connect-timeout 30 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0 Safari/537.36" \
              -H "Referer: https://www.erome.com/" \
              -H "Origin: https://www.erome.com" \
              -o "downloads/$filename" \
              -w "%{http_code}" \
              "$url")

            echo "HTTP Status: $http_code"

            if [[ "$http_code" != "200" && "$http_code" != "206" ]]; then
              echo "Download failed"
              rm -f "downloads/$filename"
              continue
            fi

            if [ ! -f "downloads/$filename" ]; then
              echo "File not created"
              continue
            fi

            size=$(stat -c%s "downloads/$filename" 2>/dev/null || echo 0)

            if [ "$size" -lt 102400 ]; then
              echo "Downloaded file is too small: $size bytes"
              rm -f "downloads/$filename"
              continue
            fi

            echo "Success: $filename"
            echo "Size: $(numfmt --to=iec "$size")"

            success=$((success + 1))

          done < <(printf '%s\n' "${{ github.event.inputs.urls }}" | tr ' ' '\n')

          echo ""
          echo "======================================"
          echo "Total URLs : $total"
          echo "Successful : $success"
          echo "Failed     : $((total-success))"
          echo "======================================"

          ls -lah downloads || true

          if [ "$success" -eq 0 ]; then
            echo "No files downloaded successfully."
            exit 1
          fi

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: download-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
