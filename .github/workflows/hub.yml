name: Pornhub Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Pornhub Video URL(s) - comma, space or newline separated"
        required: true
        type: string

      quality:
        description: "Video Quality"
        required: true
        default: "720"
        type: choice
        options:
          - "240"
          - "360"
          - "480"
          - "720"
          - "1080"
          - "best"

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          python3 -m pip install -U yt-dlp

      - name: Prepare folders
        run: |
          rm -rf downloads
          mkdir -p downloads

      - name: Download videos (FAIL SAFE + REPORT)
        shell: bash
        run: |
          set +e

          RAW_URLS="${{ github.event.inputs.video_url }}"
          QUALITY="${{ github.event.inputs.quality }}"

          if [ "$QUALITY" = "best" ]; then
            FORMAT="bestvideo+bestaudio/best"
          else
            FORMAT="bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]"
          fi

          echo "Raw input: $RAW_URLS"

          CLEAN_URLS=$(echo "$RAW_URLS" | tr ',' '\n' | tr ' ' '\n')

          INDEX=1

          SUCCESS_FILE="downloads/success.txt"
          FAILED_FILE="downloads/failed.txt"

          > "$SUCCESS_FILE"
          > "$FAILED_FILE"

          for URL in $CLEAN_URLS; do
            URL=$(echo "$URL" | xargs)

            if [ -z "$URL" ]; then
              continue
            fi

            echo "======================================"
            echo "Downloading [$INDEX]: $URL"
            echo "======================================"

            yt-dlp \
              --no-playlist \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/124 Safari/537.36" \
              --add-header "Referer:https://www.pornhub.com/" \
              -f "$FORMAT" \
              --merge-output-format mp4 \
              -o "downloads/%(title)s_${INDEX}.%(ext)s" \
              "$URL"

            STATUS=$?

            if [ $STATUS -ne 0 ]; then
              echo "FAILED: $URL"
              echo "$URL" >> "$FAILED_FILE"
            else
              echo "SUCCESS: $URL"
              echo "$URL" >> "$SUCCESS_FILE"
            fi

            INDEX=$((INDEX + 1))
          done

          set -e

      - name: Generate Release Info
        id: meta
        shell: bash
        run: |
          TAG="run-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          echo "## Download Report" > body.md
          echo "" >> body.md

          echo "### Successful Downloads:" >> body.md
          if [ -f downloads/success.txt ]; then
            cat downloads/success.txt | while read line; do
              echo "- $line" >> body.md
            done
          fi

          echo "" >> body.md
          echo "### Failed Downloads:" >> body.md
          if [ -f downloads/failed.txt ]; then
            cat downloads/failed.txt | while read line; do
              echo "- $line" >> body.md
            done
          fi
       - name: Remove empty files
         shell: bash
         run: |
            find upload -type f -size 0 -delete
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Download ${{ steps.meta.outputs.tag }}
          body_path: body.md
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
