name: Pornhub Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Pornhub Video URL(s) (one per line or comma separated)"
        required: true
        type: string

      quality:
        description: "Video Quality"
        required: true
        default: "720"
        type: choice
        options:
          - "240"
          - "360"
          - "480"
          - "720"
          - "1080"
          - "best"

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          python3 -m pip install -U yt-dlp

      - name: Prepare folders
        run: |
          rm -rf downloads
          mkdir -p downloads

      - name: Download videos
        shell: bash
        run: |
          RAW_URLS="${{ github.event.inputs.video_url }}"
          QUALITY="${{ github.event.inputs.quality }}"

          if [ "$QUALITY" = "best" ]; then
            FORMAT="bestvideo+bestaudio/best"
          else
            FORMAT="bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]"
          fi

          # تبدیل کاما به خط جدید
          CLEAN_URLS=$(echo "$RAW_URLS" | tr ',' '\n')

          INDEX=1

          while IFS= read -r URL; do
            if [ -z "$URL" ]; then
              continue
            fi

            echo "======================================"
            echo "Downloading [$INDEX]: $URL"
            echo "======================================"

            yt-dlp \
              --no-playlist \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/124 Safari/537.36" \
              --add-header "Referer:https://www.pornhub.com/" \
              -f "$FORMAT" \
              --merge-output-format mp4 \
              -o "downloads/%(title)s_${INDEX}.%(ext)s" \
              "$URL"

            if [ $? -ne 0 ]; then
              echo "Failed: $URL"
            fi

            INDEX=$((INDEX + 1))

          done <<< "$CLEAN_URLS"

      - name: Generate Release Info
        id: meta
        shell: bash
        run: |
          TAG="run-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          echo "## Downloaded Files" > body.md
          echo "" >> body.md

          for FILE in downloads/*; do
            if [ -f "$FILE" ]; then
              echo "- $(basename "$FILE")" >> body.md
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Download ${{ steps.meta.outputs.tag }}
          body_path: body.md
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
