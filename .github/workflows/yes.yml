- name: yes Download Files (KEEP ORIGINAL NAME)
  shell: bash
  run: |
    set +e

    RAW_URLS="${{ github.event.inputs.url }}"
    FORMATTED_URLS=$(echo "$RAW_URLS" | tr ',' ' ' | tr '\n' ' ')

    rm -rf tmp_downloads upload

    mkdir -p tmp_downloads
    mkdir -p upload

    SUCCESS_FILE="upload/success.txt"
    FAILED_FILE="upload/failed.txt"

    > "$SUCCESS_FILE"
    > "$FAILED_FILE"

    INDEX=1

    for URL in $FORMATTED_URLS; do
      if [ -z "$URL" ]; then
        continue
      fi

      echo "======================================"
      echo "Downloading [$INDEX]: $URL"
      echo "======================================"

      BEFORE_COUNT=$(find tmp_downloads -type f | wc -l)

      aria2c \
        --split=4 \
        --max-connection-per-server=4 \
        --dir="tmp_downloads" \
        --header="User-Agent: Mozilla/5.0" \
        "$URL"

      STATUS=$?

      AFTER_COUNT=$(find tmp_downloads -type f | wc -l)

      if [ $STATUS -ne 0 ]; then
        echo "FAILED: $URL"
        echo "$URL" >> "$FAILED_FILE"

      elif [ "$AFTER_COUNT" -le "$BEFORE_COUNT" ]; then
        echo "FAILED: $URL"
        echo "$URL" >> "$FAILED_FILE"

      else
        echo "SUCCESS: $URL"
        echo "$URL" >> "$SUCCESS_FILE"
      fi

      INDEX=$((INDEX + 1))
    done

    set -e
