name: Erome Downloader (Fast)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Direct video URLs (one per line)'
        required: true
        type: string
      connections:
        description: 'Parallel connections (default: 8)'
        required: false
        default: '8'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 curl
          mkdir -p downloads

      - name: Download
        shell: bash
        run: |
          success=0
          total=0
          
          while IFS= read -r url; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            total=$((total+1))
            
            echo "=========================================="
            echo "[$total] Downloading: $url"
            echo "=========================================="
            
            filename=$(basename "$url" | cut -d'?' -f1)
            [ -z "$filename" ] && filename="video_${total}.mp4"
            
            echo "Saving as: $filename"
            
            # aria2 with Referer
            aria2c \
              "$url" \
              --out="downloads/$filename" \
              --max-connection-per-server="${{ github.event.inputs.connections }}" \
              --split="${{ github.event.inputs.connections }}" \
              --min-split-size=1M \
              --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              --header="Referer: https://www.erome.com/" \
              --header="Origin: https://www.erome.com" \
              --referer="https://www.erome.com/" \
              --connect-timeout=30 \
              --timeout=600 \
              --max-tries=3 \
              --continue=true \
              --summary-interval=5 \
              --console-log-level=notice \
              2>&1 || {
                echo "❌ Failed: $url"
                continue
              }
            
            if [ -f "downloads/$filename" ]; then
              size=$(stat -c%s "downloads/$filename" 2>/dev/null || echo 0)
              if [ "$size" -gt 102400 ]; then
                echo "✅ Downloaded: $filename ($(numfmt --to=iec $size))"
                success=$((success+1))
              else
                echo "❌ File too small ($size bytes)"
                rm -f "downloads/$filename"
              fi
            fi
            echo ""
          done <<< "${{ github.event.inputs.urls }}"
          
          echo ""
          echo "Done! Downloaded $success/$total files"
          ls -lh downloads/
          
          [ $success -eq 0 ] && exit 1

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: erome-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
