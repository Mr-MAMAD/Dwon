name: Magnet Torrent Downloader (Stable v3)

on:
  workflow_dispatch:
    inputs:
      magnets:
        description: 'Magnet links (ONE PER LINE)'
        required: true
        type: string
      stuck_limit:
        description: 'Skip after N times SD:0 (default: 5)'
        required: false
        default: '5'
        type: string
      total_timeout:
        description: 'Max wait per magnet (minutes, default: 30)'
        required: false
        default: '30'
        type: string

jobs:
  download-torrents:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 curl

      - name: Debug - Show input magnets
        run: |
          echo "=== INPUT MAGNETS ==="
          echo "${{ github.event.inputs.magnets }}"
          echo "=== END INPUT ==="
          echo "Number of lines: $(echo "${{ github.event.inputs.magnets }}" | wc -l)"

      - name: Download torrents
        id: download
        shell: bash
        run: |
          set +e

          STUCK_LIMIT="${{ github.event.inputs.stuck_limit }}"
          TOTAL_TIMEOUT_MIN="${{ github.event.inputs.total_timeout }}"
          TOTAL_TIMEOUT_SEC=$((TOTAL_TIMEOUT_MIN * 60))

          SUCCESS_COUNT=0
          TOTAL_SIZE=0
          INDEX=0

          FAILED_LIST=""
          
          mkdir -p downloads
          
          # Save magnets to a temp file first to preserve line breaks
          cat > /tmp/magnets.txt << 'MAGNET_EOF'
          ${{ github.event.inputs.magnets }}
          MAGNET_EOF
          
          echo "=== Processing magnets ==="
          cat -n /tmp/magnets.txt
          echo "=========================="

          while IFS= read -r line; do
            # Skip empty lines
            [ -z "$(echo "$line" | tr -d '[:space:]')" ] && continue
            
            magnet=$(echo "$line" | grep -oP 'magnet:\?[^ ]+' | head -1)
            [ -z "$magnet" ] && continue

            INDEX=$((INDEX + 1))
            echo ""
            echo "=========================================="
            echo "[$INDEX] 🧲 Processing..."
            echo "Magnet: $magnet"
            echo "=========================================="

            FILENAME=$(echo "$magnet" | grep -oP 'dn=\K[^&]+' 2>/dev/null | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null)
            if [ -z "$FILENAME" ]; then
              HASH=$(echo "$magnet" | grep -oP 'btih:\K[^&]+' 2>/dev/null)
              FILENAME="torrent_${HASH:0:10}.mp4"
            fi
            FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g; s/__\+/_/g; s/\.\.\+/\./g')
            echo "📁 File: $FILENAME"

            rm -f "downloads/$FILENAME"
            LOGFILE="/tmp/aria2_${INDEX}.log"
            > "$LOGFILE"

            aria2c \
              "$magnet" \
              --dir="downloads" \
              --out="$FILENAME" \
              --seed-time=0 \
              --max-upload-limit=1K \
              --bt-max-peers=200 \
              --split=16 \
              --enable-dht=true \
              --enable-dht6=true \
              --enable-peer-exchange=true \
              --bt-enable-lpd=true \
              --bt-request-peer-speed-limit=0 \
              --timeout=600 \
              --bt-stop-timeout=600 \
              --max-tries=0 \
              --retry-wait=30 \
              --continue=true \
              --console-log-level=notice \
              --summary-interval=10 \
              2>&1 | tee "$LOGFILE" &

            ARIA_PID=$!

            SD_ZERO_COUNT=0
            LAST_LINE=""
            DOWNLOAD_STARTED=0
            START_TIME=$(date +%s)

            while kill -0 $ARIA_PID 2>/dev/null; do
              sleep 10

              PROGRESS=$(tail -1 "$LOGFILE" 2>/dev/null | grep "SD:" | tail -1)
              if [ -n "$PROGRESS" ]; then
                if echo "$PROGRESS" | grep -qE "DL:[1-9]"; then
                  DOWNLOAD_STARTED=1
                  SD_ZERO_COUNT=0
                fi
                if [ "$DOWNLOAD_STARTED" -eq 0 ]; then
                  if echo "$PROGRESS" | grep -q "SD:0"; then
                    if [ "$PROGRESS" != "$LAST_LINE" ]; then
                      SD_ZERO_COUNT=$((SD_ZERO_COUNT + 1))
                      echo "🔍 SD:0 ($SD_ZERO_COUNT/$STUCK_LIMIT)"
                      LAST_LINE="$PROGRESS"
                    fi
                  else
                    SD_ZERO_COUNT=0
                  fi
                fi
              fi

              if [ "$SD_ZERO_COUNT" -ge "$STUCK_LIMIT" ] && [ "$DOWNLOAD_STARTED" -eq 0 ]; then
                echo "⏭️ No seeders after $STUCK_LIMIT checks, skipping..."
                kill -9 $ARIA_PID 2>/dev/null
                break
              fi

              ELAPSED=$(( $(date +%s) - START_TIME ))
              if [ "$ELAPSED" -gt "$TOTAL_TIMEOUT_SEC" ]; then
                echo "⏰ Timeout (${TOTAL_TIMEOUT_MIN} min)"
                kill -9 $ARIA_PID 2>/dev/null
                break
              fi
            done

            wait $ARIA_PID 2>/dev/null

            COMPLETED=0
            if grep -q "Download complete:" "$LOGFILE"; then
              COMPLETED=1
            fi

            if [ -f "downloads/$FILENAME" ]; then
              SIZE=$(stat -c%s "downloads/$FILENAME" 2>/dev/null || echo 0)
              if [ "$COMPLETED" -eq 1 ] && [ "$SIZE" -gt 102400 ]; then
                echo "✅ [$INDEX] $FILENAME ($(numfmt --to=iec $SIZE))"
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
              else
                if [ "$COMPLETED" -eq 0 ]; then
                  echo "❌ [$INDEX] Incomplete download (stopped before finish)"
                else
                  echo "❌ [$INDEX] File too small: $SIZE bytes"
                fi
                rm -f "downloads/$FILENAME"
                FAILED_LIST="${FAILED_LIST}\n- ${FILENAME}"
              fi
            else
              echo "❌ [$INDEX] No file created"
              FAILED_LIST="${FAILED_LIST}\n- ${FILENAME} (no file)"
            fi

            echo "--- Moving to next ---"
          done < /tmp/magnets.txt

          echo ""
          echo "=========================================="
          echo "FINAL SUMMARY"
          echo "=========================================="
          echo "Total processed: $INDEX"
          echo "Success count: $SUCCESS_COUNT"
          echo "Total size: $TOTAL_SIZE"
          echo "Files in downloads:"
          ls -lah downloads/ || echo "No files found"
          echo "=========================================="

          # Write outputs (even if zero success, we don't fail the job)
          echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "TOTAL_SIZE=$TOTAL_SIZE" >> $GITHUB_OUTPUT

          # Write report
          {
            echo "# 📊 Download Report"
            echo ""
            echo "| Total | Success | Skip Limit |"
            echo "|-------|---------|------------|"
            echo "| $INDEX | $SUCCESS_COUNT | $STUCK_LIMIT × SD:0 |"
            echo ""
            if [ $SUCCESS_COUNT -gt 0 ]; then
              echo "## ✅ Downloaded"
              for f in downloads/*; do
                [ -f "$f" ] && echo "- \`$(basename "$f")\` ($(numfmt --to=iec $(stat -c%s "$f")))"
              done
            fi
            if [ -n "$FAILED_LIST" ]; then
              echo ""
              echo "## ❌ Failed"
              echo -e "$FAILED_LIST"
            fi
          } > download_report.md
          
          cat download_report.md

          # NO exit 1 here – let the job succeed always
          echo "Done processing all magnets. Total success: $SUCCESS_COUNT"

      - name: Release
        if: steps.download.outputs.SUCCESS_COUNT != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: torrent-${{ github.run_number }}
          name: 🧲 Torrent #${{ github.run_number }}
          body_path: download_report.md
          files: |
            downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
