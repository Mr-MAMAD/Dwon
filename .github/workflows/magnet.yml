name: Magnet Torrent Downloader (Multi Fix)

on:
  workflow_dispatch:
    inputs:
      magnets:
        description: 'Magnet links (ONE PER LINE)'
        required: true
        type: string

jobs:
  download-torrents:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 curl

      - name: Download torrents
        id: download
        shell: bash
        run: |
          set +e
          
          SUCCESS_COUNT=0
          FAILED_LIST=""
          TOTAL_SIZE=0
          INDEX=0
          
          mkdir -p downloads
          
          while IFS= read -r magnet; do
            # Clean up the line
            magnet=$(echo "$magnet" | xargs)
            
            # Skip empty lines and lines that are not magnet links
            if [ -z "$magnet" ]; then
              continue
            fi
            
            if ! echo "$magnet" | grep -q "^magnet:"; then
              echo "⚠️ Skipping non-magnet line: ${magnet:0:80}..."
              continue
            fi
            
            INDEX=$((INDEX + 1))
            
            echo "=========================================="
            echo "[$INDEX] 🧲 Processing magnet..."
            echo "=========================================="
            
            # Extract ONLY the first magnet link (in case multiple on one line)
            magnet=$(echo "$magnet" | grep -oP 'magnet:\?[^ ]+' | head -1)
            
            # Extract filename from dn parameter
            FILENAME=$(echo "$magnet" | grep -oP 'dn=\K[^&]+' 2>/dev/null | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null)
            
            if [ -z "$FILENAME" ]; then
              HASH=$(echo "$magnet" | grep -oP 'btih:\K[^&]+' 2>/dev/null)
              FILENAME="torrent_${HASH:0:10}.mp4"
            fi
            
            # Clean filename: replace spaces and special chars, keep only one dot for extension
            FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g' | sed 's/__\+/_/g' | sed 's/\.\.\+/\./g')
            
            echo "📁 File: $FILENAME"
            echo "🚀 Starting download..."
            echo ""
            
            # Record files before
            ls downloads/ > /tmp/before_${INDEX}.txt 2>/dev/null
            
            # Download
            aria2c \
              "$magnet" \
              --dir="downloads" \
              --out="$FILENAME" \
              --seed-time=0 \
              --max-upload-limit=10K \
              --bt-max-peers=100 \
              --split=16 \
              --enable-dht=true \
              --enable-peer-exchange=true \
              --bt-enable-lpd=true \
              --bt-stop-timeout=600 \
              --timeout=600 \
              --max-tries=5 \
              --retry-wait=5 \
              --continue=true \
              --console-log-level=notice \
              --summary-interval=10 \
              2>&1 | tee "/tmp/aria2_${INDEX}.log" || true
            
            # Find new file
            ls downloads/ > /tmp/after_${INDEX}.txt 2>/dev/null
            NEW_FILE=$(comm -13 /tmp/before_${INDEX}.txt /tmp/after_${INDEX}.txt 2>/dev/null | head -1)
            
            if [ -z "$NEW_FILE" ]; then
              [ -f "downloads/$FILENAME" ] && NEW_FILE="$FILENAME"
              [ -z "$NEW_FILE" ] && NEW_FILE=$(ls -t downloads/ 2>/dev/null | head -1)
            fi
            
            if [ -f "downloads/$NEW_FILE" ] && [ -n "$NEW_FILE" ]; then
              SIZE=$(stat -c%s "downloads/$NEW_FILE" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 102400 ]; then
                echo ""
                echo "✅ [$INDEX] $NEW_FILE ($(numfmt --to=iec $SIZE))"
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
              else
                echo ""
                echo "❌ [$INDEX] Too small: $SIZE bytes"
                rm -f "downloads/$NEW_FILE"
                FAILED_LIST="$FAILED_LIST\n- [$INDEX] $FILENAME (${SIZE} bytes)"
              fi
            else
              echo ""
              echo "❌ [$INDEX] Failed"
              FAILED_LIST="$FAILED_LIST\n- [$INDEX] $FILENAME"
            fi
            
            echo ""
          done <<< "${{ github.event.inputs.magnets }}"
          
          echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "TOTAL_SIZE=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          
          {
            echo "# 📊 Report"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Total | $INDEX |"
            echo "| Success | $SUCCESS_COUNT |"
            echo "| Size | $(numfmt --to=iec $TOTAL_SIZE) |"
            echo ""
            
            if [ $SUCCESS_COUNT -gt 0 ]; then
              echo "## ✅ Downloaded"
              for f in downloads/*; do
                [ -f "$f" ] && echo "- $(basename "$f") ($(numfmt --to=iec $(stat -c%s "$f")))"
              done
            fi
            
            [ -n "$FAILED_LIST" ] && echo -e "\n## ❌ Failed\n$FAILED_LIST"
          } > download_report.md
          
          [ "$SUCCESS_COUNT" -eq 0 ] && exit 1

      - name: Release
        if: steps.download.outputs.SUCCESS_COUNT != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: torrent-${{ github.run_number }}
          name: 🧲 Torrent #${{ github.run_number }}
          body_path: download_report.md
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
