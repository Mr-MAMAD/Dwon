name: Magnet Torrent Downloader (Low Seeds OK)

on:
  workflow_dispatch:
    inputs:
      magnets:
        description: 'Magnet links (ONE PER LINE)'
        required: true
        type: string
      stuck_limit:
        description: 'Skip after X times SD:0 (default: 15)'
        required: false
        default: '15'
        type: string

jobs:
  download-torrents:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 curl

      - name: Download torrents
        id: download
        shell: bash
        run: |
          set +e
          
          STUCK_LIMIT="${{ github.event.inputs.stuck_limit }}"
          SUCCESS_COUNT=0
          FAILED_LIST=""
          TOTAL_SIZE=0
          INDEX=0
          
          mkdir -p downloads
          
          while IFS= read -r magnet; do
            magnet=$(echo "$magnet" | xargs)
            
            if [ -z "$magnet" ]; then
              continue
            fi
            
            if ! echo "$magnet" | grep -q "^magnet:"; then
              echo "⚠️ Skipping: ${magnet:0:80}..."
              continue
            fi
            
            INDEX=$((INDEX + 1))
            
            echo "=========================================="
            echo "[$INDEX] 🧲 Processing..."
            echo "=========================================="
            
            magnet=$(echo "$magnet" | grep -oP 'magnet:\?[^ ]+' | head -1)
            
            FILENAME=$(echo "$magnet" | grep -oP 'dn=\K[^&]+' 2>/dev/null | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null)
            
            if [ -z "$FILENAME" ]; then
              HASH=$(echo "$magnet" | grep -oP 'btih:\K[^&]+' 2>/dev/null)
              FILENAME="torrent_${HASH:0:10}.mp4"
            fi
            
            FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g' | sed 's/__\+/_/g' | sed 's/\.\.\+/\./g')
            
            echo "📁 File: $FILENAME"
            echo "⏱️ Skip after: ${STUCK_LIMIT} × SD:0"
            echo ""
            
            ls downloads/ > /tmp/before_${INDEX}.txt 2>/dev/null
            
            # **** کلید کار: --timeout=600 (نه 0) و --bt-stop-timeout=600 ****
            aria2c \
              "$magnet" \
              --dir="downloads" \
              --out="$FILENAME" \
              --seed-time=0 \
              --max-upload-limit=1K \
              --bt-max-peers=200 \
              --bt-request-peer-speed-limit=0 \
              --split=16 \
              --min-split-size=1M \
              --connect-timeout=60 \
              --timeout=600 \
              --bt-stop-timeout=600 \
              --max-tries=0 \
              --retry-wait=30 \
              --continue=true \
              --allow-overwrite=false \
              --auto-file-renaming=false \
              --file-allocation=none \
              --disk-cache=128M \
              --summary-interval=10 \
              --console-log-level=notice \
              --enable-dht=true \
              --enable-dht6=true \
              --enable-peer-exchange=true \
              --bt-enable-lpd=true \
              --bt-tracker-connect-timeout=30 \
              --bt-tracker-timeout=30 \
              --dht-entry-point="dht.transmissionbt.com:6881" \
              --dht-entry-point="router.bittorrent.com:6881" \
              --dht-entry-point="router.utorrent.com:6881" \
              --dht-entry-point="dht.aelitis.com:6881" \
              2>&1 | tee "/tmp/aria2_${INDEX}.log" &
            
            ARIA_PID=$!
            
            # نظارت پیشرفته برای پرش از سیدر صفر مطلق
            SD_ZERO_COUNT=0
            LAST_SD_LINE=""
            DOWNLOAD_STARTED=0
            LAST_SIZE=0
            STUCK_SIZE_COUNT=0
            
            while kill -0 $ARIA_PID 2>/dev/null; do
              sleep 10
              
              # دریافت آخرین خط دارای SD و DL
              PROGRESS=$(tail -1 "/tmp/aria2_${INDEX}.log" 2>/dev/null | grep "SD:" | tail -1)
              
              if [ -n "$PROGRESS" ]; then
                # چک کن دانلود واقعی شروع شده (سرعت > 0)
                if echo "$PROGRESS" | grep -qE "DL:[1-9][0-9]*[KMG]"; then
                  DOWNLOAD_STARTED=1
                  SD_ZERO_COUNT=0
                  echo "   📥 $PROGRESS" | grep -oP '\[.*?\].*'
                fi
                
                # فقط وقتی دانلود هنوز شروع نشده، تعداد SD:0 رو بشمار
                if [ "$DOWNLOAD_STARTED" -eq 0 ]; then
                  if echo "$PROGRESS" | grep -q "SD:0"; then
                    if [ "$PROGRESS" != "$LAST_SD_LINE" ]; then
                      SD_ZERO_COUNT=$((SD_ZERO_COUNT + 1))
                      echo "🔍 Finding peers... ($SD_ZERO_COUNT/$STUCK_LIMIT)"
                      LAST_SD_LINE="$PROGRESS"
                    fi
                  else
                    # سیدر پیدا شده (حتی 1) → صبر کن دانلود شروع بشه
                    if [ "$SD_ZERO_COUNT" -gt 0 ]; then
                      echo "🟢 Seeders found! Waiting for download..."
                    fi
                    SD_ZERO_COUNT=0
                  fi
                fi
                
                # تشخیص توقف دانلود (stall) بعد از شروع
                if [ "$DOWNLOAD_STARTED" -eq 1 ]; then
                  if [ -f "downloads/$FILENAME" ]; then
                    SIZE=$(stat -c%s "downloads/$FILENAME" 2>/dev/null || echo 0)
                    if [ "$SIZE" -eq "$LAST_SIZE" ] && [ "$SIZE" -gt 0 ] && echo "$PROGRESS" | grep -q "DL:0B"; then
                      STUCK_SIZE_COUNT=$((STUCK_SIZE_COUNT + 1))
                    else
                      STUCK_SIZE_COUNT=0
                    fi
                    LAST_SIZE=$SIZE
                  fi
                fi
              fi
              
              # پرش: فقط اگر هیچ سیدری پیدا نشه (SD:0 مکرر) و دانلود شروع نشده باشه
              if [ "$SD_ZERO_COUNT" -ge "$STUCK_LIMIT" ] && [ "$DOWNLOAD_STARTED" -eq 0 ]; then
                echo ""
                echo "⏭️ No seeders after ${STUCK_LIMIT} attempts, skipping..."
                kill -9 $ARIA_PID 2>/dev/null
                break
              fi
              
              # توقف اگر دانلود کاملاً قفل شده (۵۰×۱۰ثانیه ≈ ۸ دقیقه بدون تغییر)
              if [ "$STUCK_SIZE_COUNT" -ge 50 ] && [ "$DOWNLOAD_STARTED" -eq 1 ]; then
                CURRENT=$(stat -c%s "downloads/$FILENAME" 2>/dev/null || echo 0)
                if [ "$CURRENT" -gt 1048576 ]; then
                  echo "⚠️ Download stalled, keeping partial ($(numfmt --to=iec $CURRENT))"
                fi
                kill -9 $ARIA_PID 2>/dev/null
                break
              fi
            done
            
            wait $ARIA_PID 2>/dev/null
            
            # بررسی نتیجه
            ls downloads/ > /tmp/after_${INDEX}.txt 2>/dev/null
            NEW_FILE=$(comm -13 /tmp/before_${INDEX}.txt /tmp/after_${INDEX}.txt 2>/dev/null | head -1)
            
            if [ -z "$NEW_FILE" ]; then
              [ -f "downloads/$FILENAME" ] && NEW_FILE="$FILENAME"
              [ -z "$NEW_FILE" ] && NEW_FILE=$(ls -t downloads/ 2>/dev/null | head -1)
            fi
            
            if [ -f "downloads/$NEW_FILE" ] && [ -n "$NEW_FILE" ]; then
              SIZE=$(stat -c%s "downloads/$NEW_FILE" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 102400 ]; then
                echo ""
                echo "✅ [$INDEX] $NEW_FILE ($(numfmt --to=iec $SIZE))"
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
              else
                echo ""
                echo "❌ [$INDEX] Too small: $SIZE bytes"
                rm -f "downloads/$NEW_FILE"
                FAILED_LIST="$FAILED_LIST\n- [$INDEX] $FILENAME (${SIZE} bytes)"
              fi
            else
              echo ""
              echo "❌ [$INDEX] Failed (no seeders or error)"
              FAILED_LIST="$FAILED_LIST\n- [$INDEX] $FILENAME (no seeders)"
            fi
            
            echo ""
            echo "--- Moving to next ---"
            echo ""
          done <<< "${{ github.event.inputs.magnets }}"
          
          echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          
          {
            echo "# 📊 Report"
            echo ""
            echo "| Total | Success | Skip Limit |"
            echo "|-------|---------|------------|"
            echo "| $INDEX | $SUCCESS_COUNT | $STUCK_LIMIT×SD:0 |"
            echo ""
            
            if [ $SUCCESS_COUNT -gt 0 ]; then
              echo "## ✅ Downloaded"
              for f in downloads/*; do
                [ -f "$f" ] && echo "- $(basename "$f") ($(numfmt --to=iec $(stat -c%s "$f")))"
              done
            fi
            
            [ -n "$FAILED_LIST" ] && echo -e "\n## ❌ Failed\n$FAILED_LIST"
          } > download_report.md
          
          [ "$SUCCESS_COUNT" -eq 0 ] && exit 1

      - name: Release
        if: steps.download.outputs.SUCCESS_COUNT != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: torrent-${{ github.run_number }}
          name: 🧲 Torrent #${{ github.run_number }}
          body_path: download_report.md
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
