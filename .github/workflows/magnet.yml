name: Magnet Torrent Downloader (Stable)

on:
  workflow_dispatch:
    inputs:
      magnets:
        description: 'Magnet links (ONE PER LINE)'
        required: true
        type: string
      stuck_limit:
        description: 'Skip after N times SD:0 (default: 5)'
        required: false
        default: '5'
        type: string
      total_timeout:
        description: 'Max wait per magnet (minutes, default: 30)'
        required: false
        default: '30'
        type: string

jobs:
  download-torrents:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 curl

      - name: Download torrents
        id: download
        shell: bash
        run: |
          set +e

          STUCK_LIMIT="${{ github.event.inputs.stuck_limit }}"
          TOTAL_TIMEOUT_MIN="${{ github.event.inputs.total_timeout }}"
          TOTAL_TIMEOUT_SEC=$((TOTAL_TIMEOUT_MIN * 60))

          SUCCESS_COUNT=0
          FAILED_LIST=""
          TOTAL_SIZE=0
          INDEX=0

          mkdir -p downloads

          while IFS= read -r line; do
            # Remove leading/trailing spaces, extract first magnet link from line
            magnet=$(echo "$line" | xargs | grep -oP 'magnet:\?[^ ]+' | head -1)
            [ -z "$magnet" ] && continue

            INDEX=$((INDEX + 1))
            echo "=========================================="
            echo "[$INDEX] 🧲 Processing..."
            echo "=========================================="

            # Extract filename
            FILENAME=$(echo "$magnet" | grep -oP 'dn=\K[^&]+' 2>/dev/null | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null)
            if [ -z "$FILENAME" ]; then
              HASH=$(echo "$magnet" | grep -oP 'btih:\K[^&]+' 2>/dev/null)
              FILENAME="torrent_${HASH:0:10}.mp4"
            fi
            # Clean filename: keep only safe characters
            FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g; s/__\+/_/g; s/\.\.\+/\./g')
            echo "📁 File: $FILENAME"

            # Remove stale file if present
            rm -f "downloads/$FILENAME"

            # Log file for aria2
            LOGFILE="/tmp/aria2_${INDEX}.log"
            > "$LOGFILE"

            # Start aria2 (background)
            aria2c \
              "$magnet" \
              --dir="downloads" \
              --out="$FILENAME" \
              --seed-time=0 \
              --max-upload-limit=1K \
              --bt-max-peers=200 \
              --split=16 \
              --enable-dht=true \
              --enable-dht6=true \
              --enable-peer-exchange=true \
              --bt-enable-lpd=true \
              --bt-request-peer-speed-limit=0 \
              --timeout=600 \
              --bt-stop-timeout=600 \
              --max-tries=0 \
              --retry-wait=30 \
              --continue=true \
              --console-log-level=notice \
              --summary-interval=10 \
              2>&1 | tee "$LOGFILE" &

            ARIA_PID=$!

            # Monitor for SD:0
            SD_ZERO_COUNT=0
            LAST_LINE=""
            DOWNLOAD_STARTED=0
            START_TIME=$(date +%s)

            while kill -0 $ARIA_PID 2>/dev/null; do
              sleep 10

              # Get latest line with SD:
              PROGRESS=$(tail -1 "$LOGFILE" 2>/dev/null | grep "SD:" | tail -1)

              if [ -n "$PROGRESS" ]; then
                # Check if download speed > 0
                if echo "$PROGRESS" | grep -qE "DL:[1-9]"; then
                  DOWNLOAD_STARTED=1
                  SD_ZERO_COUNT=0
                  echo "   📥 Downloading..."
                fi

                # If download hasn't started yet, count SD:0
                if [ "$DOWNLOAD_STARTED" -eq 0 ]; then
                  if echo "$PROGRESS" | grep -q "SD:0"; then
                    if [ "$PROGRESS" != "$LAST_LINE" ]; then
                      SD_ZERO_COUNT=$((SD_ZERO_COUNT + 1))
                      echo "🔍 SD:0 ($SD_ZERO_COUNT/$STUCK_LIMIT)"
                      LAST_LINE="$PROGRESS"
                    fi
                  else
                    # Seeders appeared (even 1)
                    SD_ZERO_COUNT=0
                  fi
                fi
              fi

              # Skip if stuck too many times without seeders
              if [ "$SD_ZERO_COUNT" -ge "$STUCK_LIMIT" ] && [ "$DOWNLOAD_STARTED" -eq 0 ]; then
                echo "⏭️ No seeders after $STUCK_LIMIT checks, skipping..."
                kill -9 $ARIA_PID 2>/dev/null
                break
              fi

              # Global timeout
              ELAPSED=$(( $(date +%s) - START_TIME ))
              if [ "$ELAPSED" -gt "$TOTAL_TIMEOUT_SEC" ]; then
                echo "⏰ Timeout (${TOTAL_TIMEOUT_MIN} min)"
                kill -9 $ARIA_PID 2>/dev/null
                break
              fi
            done

            wait $ARIA_PID 2>/dev/null

            # Check result
            if [ -f "downloads/$FILENAME" ]; then
              SIZE=$(stat -c%s "downloads/$FILENAME" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 102400 ]; then
                echo "✅ [$INDEX] $FILENAME ($(numfmt --to=iec $SIZE))"
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
              else
                echo "❌ [$INDEX] File too small: $SIZE bytes"
                rm -f "downloads/$FILENAME"
                FAILED_LIST="$FAILED_LIST\n- $FILENAME (small file)"
              fi
            else
              echo "❌ [$INDEX] Download failed"
              FAILED_LIST="$FAILED_LIST\n- $FILENAME (no data)"
            fi

            echo ""
            echo "--- Moving to next ---"
            echo ""
          done <<< "${{ github.event.inputs.magnets }}"

          echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_OUTPUT

          # Report
          {
            echo "# 📊 Download Report"
            echo ""
            echo "| Total | Success | Skip Limit |"
            echo "|-------|---------|------------|"
            echo "| $INDEX | $SUCCESS_COUNT | $STUCK_LIMIT × SD:0 |"
            echo ""
            if [ $SUCCESS_COUNT -gt 0 ]; then
              echo "## ✅ Downloaded"
              echo ""
              for f in downloads/*; do
                [ -f "$f" ] && echo "- \`$(basename "$f")\` ($(numfmt --to=iec $(stat -c%s "$f")))"
              done
            fi
            if [ -n "$FAILED_LIST" ]; then
              echo ""
              echo "## ❌ Failed"
              echo -e "$FAILED_LIST"
            fi
          } > download_report.md

          [ $SUCCESS_COUNT -eq 0 ] && exit 1

      - name: Release
        if: steps.download.outputs.SUCCESS_COUNT != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: torrent-${{ github.run_number }}
          name: 🧲 Torrent #${{ github.run_number }}
          body_path: download_report.md
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
