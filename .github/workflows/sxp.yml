name: sxp DL Release PRO

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URLs (space/comma/newline separated)"
        required: true
        type: string

      cookie:
        description: "Manual Cookie Header (Optional - overrides cookies.txt)"
        required: false
        type: string
        default: ""

      referer:
        description: "Referer (Optional)"
        required: false
        type: string
        default: ""

      password:
        description: "Archive Password (Optional)"
        required: false
        type: string
        default: ""

jobs:
  direct-download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        shell: bash
        run: |
          sudo apt-get update -qq

          sudo apt-get install -y \
            aria2 \
            curl \
            ffmpeg \
            p7zip-full \
            mediainfo \
            jq

          sudo curl -L \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp

          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Prepare Workspace
        shell: bash
        run: |
          rm -rf tmp_downloads
          rm -rf upload

          mkdir -p tmp_downloads
          mkdir -p upload

          touch upload/success.txt
          touch upload/failed.txt

      - name: Download Files
        shell: bash
        run: |
          set +e

          RAW_URLS="${{ github.event.inputs.url }}"
          MANUAL_COOKIE="${{ github.event.inputs.cookie }}"
          REFERER="${{ github.event.inputs.referer }}"

          IFS=$'\n ,'
          read -ra URLS <<< "$RAW_URLS"

          INDEX=1

          for URL in "${URLS[@]}"; do

            if [ -z "$URL" ]; then
              continue
            fi

            echo "=================================================="
            echo "DOWNLOAD [$INDEX]: $URL"
            echo "=================================================="

            SAFE_NAME="file_${INDEX}"

            # ---------------- yt-dlp ----------------
            YTDLP_ARGS=(
              --no-part
              --no-playlist
              --restrict-filenames
              -o "tmp_downloads/${SAFE_NAME}.%(ext)s"
              --add-header "User-Agent:Mozilla/5.0"
            )

            if [ -n "$REFERER" ]; then
              YTDLP_ARGS+=(--add-header "Referer:$REFERER")
            fi

            # Manual cookie overrides everything
            if [ -n "$MANUAL_COOKIE" ]; then
              YTDLP_ARGS+=(--add-header "Cookie:$MANUAL_COOKIE")
            elif [ -f "cookies.txt" ]; then
              YTDLP_ARGS+=(--cookies cookies.txt)
            fi

            echo "Trying yt-dlp..."
            yt-dlp "${YTDLP_ARGS[@]}" "$URL"

            STATUS=$?

            # ---------------- aria2 fallback ----------------
            if [ $STATUS -ne 0 ]; then

              echo "yt-dlp failed -> aria2 fallback"

              ARIA_ARGS=(
                --split=1
                --max-connection-per-server=1
                --max-tries=5
                --retry-wait=10
                --continue=true
                --timeout=60
                --auto-file-renaming=true
                --dir=tmp_downloads
                --header="User-Agent: Mozilla/5.0"
              )

              if [ -n "$REFERER" ]; then
                ARIA_ARGS+=(--referer="$REFERER")
              fi

              if [ -n "$MANUAL_COOKIE" ]; then
                ARIA_ARGS+=(--header="Cookie: $MANUAL_COOKIE")
              fi

              aria2c "${ARIA_ARGS[@]}" "$URL"

              STATUS=$?
            fi

            # ---------------- curl fallback ----------------
            if [ $STATUS -ne 0 ]; then

              echo "aria2 failed -> curl fallback"

              SAFE_EXT=$(echo "$URL" | awk -F. '{print $NF}' | cut -d'?' -f1)
              OUTPUT_FILE="tmp_downloads/${SAFE_NAME}.${SAFE_EXT}"

              CURL_ARGS=(
                -L
                -A "Mozilla/5.0"
                --retry 5
                --connect-timeout 60
              )

              if [ -n "$REFERER" ]; then
                CURL_ARGS+=(-e "$REFERER")
              fi

              if [ -n "$MANUAL_COOKIE" ]; then
                CURL_ARGS+=(-H "Cookie: $MANUAL_COOKIE")
              fi

              curl "${CURL_ARGS[@]}" \
                -o "$OUTPUT_FILE" \
                "$URL"

              STATUS=$?
            fi

            # ---------------- validation ----------------
            VALID=0

            for FILE in tmp_downloads/*; do

              [ -f "$FILE" ] || continue
              [ -s "$FILE" ] || { rm -f "$FILE"; continue; }

              MIME=$(file --mime-type -b "$FILE")

              case "$MIME" in
                text/html|application/json|text/plain)
                  rm -f "$FILE"
                  ;;
                *)
                  VALID=1
                  ;;
              esac

            done

            if [ "$VALID" -eq 1 ]; then
              echo "$URL" >> upload/success.txt
            else
              echo "$URL" >> upload/failed.txt
            fi

            INDEX=$((INDEX + 1))

          done

          set -e

      - name: Prepare Uploads
        shell: bash
        run: |
          PASS="${{ github.event.inputs.password }}"

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue

            BASENAME=$(basename "$FILE")

            if [ -n "$PASS" ]; then
              7z a -p"$PASS" -mhe=on "upload/${BASENAME}.7z" "$FILE"
            else
              cp "$FILE" "upload/$BASENAME"
            fi
          done

      - name: Generate Release
        id: meta
        shell: bash
        run: |
          TAG="run-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          {
            echo "# Report"
            echo "## Success"
            cat upload/success.txt
            echo "## Failed"
            cat upload/failed.txt
            echo "## Files"
            ls upload
          } > body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Download ${{ steps.meta.outputs.tag }}
          body_path: body.md
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
