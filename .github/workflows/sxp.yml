name: sxp Video Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک صفحات SxyPrn (هر خط یک لینک)'
        required: true
        type: string
      quality:
        description: 'کیفیت (max/hd/sd)'
        required: false
        default: 'max'
        type: choice
        options:
          - max
          - hd
          - sd

jobs:
  download-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget aria2 jq

      - name: Download videos
        id: download
        run: |
          mapfile -t URL_ARRAY <<< "${{ github.event.inputs.urls }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          SUCCESS_COUNT=0
          FAILED_LIST=""
          TOTAL_SIZE=0
          
          mkdir -p downloads
          
          INDEX=0
          for page_url in "${URL_ARRAY[@]}"; do
            page_url=$(echo "$page_url" | xargs)
            if [ -z "$page_url" ]; then
              continue
            fi
            
            INDEX=$((INDEX + 1))
            
            echo "=========================================="
            echo "[$INDEX] 🌐 صفحه: $page_url"
            echo "=========================================="
            
            # استخراج slug از URL برای نام فایل
            SLUG=$(echo "$page_url" | grep -oP 'post/\K[^?]+' | sed 's/\.html$//')
            if [ -z "$SLUG" ]; then
              SLUG="video_$INDEX"
            fi
            
            # دانلود صفحه
            echo "📥 دانلود صفحه..."
            PAGE_HTML=$(curl -s -L \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
              -H "Accept-Language: en-US,en;q=0.5" \
              --connect-timeout 30 \
              --max-time 60 \
              "$page_url" 2>/dev/null)
            
            if [ -z "$PAGE_HTML" ]; then
              echo "❌ صفحه دانلود نشد"
              FAILED_LIST="$FAILED_LIST\n- [$INDEX] $page_url (صفحه لود نشد)"
              continue
            fi
            
            echo "✅ صفحه دانلود شد ($(echo "$PAGE_HTML" | wc -c) بایت)"
            
            # استخراج لینک ویدیو
            echo "🔍 جستجوی لینک ویدیو..."
            
            # ذخیره HTML برای دیباگ
            echo "$PAGE_HTML" > "/tmp/page_$INDEX.html"
            
            VIDEO_URL=""
            
            # روش 1: src در تگ video
            VIDEO_URL=$(echo "$PAGE_HTML" | grep -oP 'src="https?://[^"]*trafficdeposit[^"]*' | head -1 | sed 's/^src="//')
            [ -n "$VIDEO_URL" ] && echo "   ✅ روش 1: تگ video src"
            
            # روش 2: data-src
            if [ -z "$VIDEO_URL" ]; then
              VIDEO_URL=$(echo "$PAGE_HTML" | grep -oP 'data-src="https?://[^"]*trafficdeposit[^"]*' | head -1 | sed 's/^data-src="//')
              [ -n "$VIDEO_URL" ] && echo "   ✅ روش 2: data-src"
            fi
            
            # روش 3: video_url در جاوااسکریپت
            if [ -z "$VIDEO_URL" ]; then
              VIDEO_URL=$(echo "$PAGE_HTML" | grep -oP "video_url:\s*'https?://[^']*trafficdeposit[^']*" | head -1 | sed "s/video_url:\s*'//")
              [ -n "$VIDEO_URL" ] && echo "   ✅ روش 3: video_url"
            fi
            
            # روش 4: source داخل video
            if [ -z "$VIDEO_URL" ]; then
              VIDEO_URL=$(echo "$PAGE_HTML" | grep -oP '<source[^>]*src="https?://[^"]*trafficdeposit[^"]*' | head -1 | grep -oP 'src="\K[^"]*')
              [ -n "$VIDEO_URL" ] && echo "   ✅ روش 4: source tag"
            fi
            
            # روش 5: هر لینکی که trafficdeposit داشته باشه
            if [ -z "$VIDEO_URL" ]; then
              VIDEO_URL=$(echo "$PAGE_HTML" | grep -oP 'https?://[^"'\''<>]*trafficdeposit[^"'\''<>]*\.(mp4|vid|m3u8|ts)[^"'\''<>]*' | head -1)
              [ -n "$VIDEO_URL" ] && echo "   ✅ روش 5: لینک trafficdeposit"
            fi
            
            # روش 6: لینک‌های widi
            if [ -z "$VIDEO_URL" ]; then
              VIDEO_URL=$(echo "$PAGE_HTML" | grep -oP 'https?://[^"'\''<>]*/widi/[^"'\''<>]*' | head -1)
              [ -n "$VIDEO_URL" ] && echo "   ✅ روش 6: widi link"
            fi
            
            # روش 7: همه لینک‌ها رو بگیر و trafficdeposit رو پیدا کن
            if [ -z "$VIDEO_URL" ]; then
              echo "   🔍 روش 7: جستجوی عمیق..."
              ALL_LINKS=$(echo "$PAGE_HTML" | grep -oP 'https?://[^"'\''<>\s]+' | sort -u)
              VIDEO_URL=$(echo "$ALL_LINKS" | grep -i "trafficdeposit" | head -1)
              [ -n "$VIDEO_URL" ] && echo "   ✅ روش 7: پیدا شد"
            fi
            
            # روش 8: لینک‌های vid یا mp4
            if [ -z "$VIDEO_URL" ]; then
              ALL_LINKS=$(echo "$PAGE_HTML" | grep -oP 'https?://[^"'\''<>\s]+' | sort -u)
              VIDEO_URL=$(echo "$ALL_LINKS" | grep -iE "\.vid|\.mp4|/widi/" | grep -v "sxyprn.com" | head -1)
              [ -n "$VIDEO_URL" ] && echo "   ✅ روش 8: video file link"
            fi
            
            # روش 9: استخراج از iframe
            if [ -z "$VIDEO_URL" ]; then
              echo "   🔍 روش 9: بررسی iframe..."
              IFRAME_URL=$(echo "$PAGE_HTML" | grep -oP 'iframe[^>]*src="https?://[^"]*"' | head -1 | grep -oP 'src="\K[^"]*')
              
              if [ -n "$IFRAME_URL" ]; then
                echo "   📥 دانلود iframe: ${IFRAME_URL:0:100}..."
                IFRAME_HTML=$(curl -s -L \
                  -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                  -H "Referer: $page_url" \
                  --connect-timeout 30 \
                  --max-time 60 \
                  "$IFRAME_URL" 2>/dev/null)
                
                VIDEO_URL=$(echo "$IFRAME_HTML" | grep -oP 'https?://[^"'\''<>]*trafficdeposit[^"'\''<>]*' | head -1)
                [ -z "$VIDEO_URL" ] && VIDEO_URL=$(echo "$IFRAME_HTML" | grep -oP 'https?://[^"'\''<>]*\.(mp4|vid)[^"'\''<>]*' | head -1)
                [ -n "$VIDEO_URL" ] && echo "   ✅ روش 9: از iframe"
              fi
            fi
            
            # روش 10: API احتمالی
            if [ -z "$VIDEO_URL" ]; then
              echo "   🔍 روش 10: بررسی API..."
              VIDEO_ID=$(echo "$page_url" | grep -oP 'post/\K[^.?]+')
              
              # تلاش API‌های مختلف
              API_URLS=(
                "https://sxyprn.com/api/video/$VIDEO_ID"
                "https://sxyprn.com/api/post/$VIDEO_ID"
                "https://sxyprn.com/ajax/video/$VIDEO_ID"
              )
              
              for API_URL in "${API_URLS[@]}"; do
                echo "   📡 تلاش: $API_URL"
                API_RESPONSE=$(curl -s -L \
                  -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                  -H "Accept: application/json, text/html" \
                  -H "Referer: $page_url" \
                  -H "X-Requested-With: XMLHttpRequest" \
                  --connect-timeout 30 \
                  --max-time 30 \
                  "$API_URL" 2>/dev/null)
                
                if [ -n "$API_RESPONSE" ]; then
                  VIDEO_URL=$(echo "$API_RESPONSE" | grep -oP '"video_url":"[^"]*"' | cut -d'"' -f4 | sed 's/\\//g')
                  [ -z "$VIDEO_URL" ] && VIDEO_URL=$(echo "$API_RESPONSE" | grep -oP '"file":"[^"]*"' | cut -d'"' -f4)
                  [ -z "$VIDEO_URL" ] && VIDEO_URL=$(echo "$API_RESPONSE" | grep -oP '"src":"[^"]*"' | cut -d'"' -f4)
                  [ -z "$VIDEO_URL" ] && VIDEO_URL=$(echo "$API_RESPONSE" | grep -oP 'https?://[^"]*trafficdeposit[^"]*' | head -1)
                  
                  if [ -n "$VIDEO_URL" ]; then
                    echo "   ✅ روش 10: از API پیدا شد"
                    break
                  fi
                fi
              done
            fi
            
            if [ -z "$VIDEO_URL" ]; then
              echo "❌ لینک ویدیو پیدا نشد"
              echo ""
              echo "📄 خطوط مرتبط صفحه:"
              echo "$PAGE_HTML" | grep -i "video\|source\|trafficdeposit\|widi\|\.vid\|\.mp4\|iframe" | head -15
              echo ""
              echo "📄 همه لینک‌های صفحه:"
              echo "$PAGE_HTML" | grep -oP 'https?://[^"'\''<>\s]+' | grep -v "google\|facebook\|twitter\|schema\|w3\.org" | head -30
              echo ""
              FAILED_LIST="$FAILED_LIST\n- [$INDEX] $page_url (لینک ویدیو استخراج نشد)"
              continue
            fi
            
            echo ""
            echo "🎬 لینک ویدیو: $VIDEO_URL"
            
            # تمیز کردن لینک (بعضی وقتا escaped character داره)
            VIDEO_URL=$(echo "$VIDEO_URL" | sed 's/\\//g')
            
            # تعیین نام فایل
            FILENAME="${SLUG}.mp4"
            
            echo "📁 ذخیره به عنوان: $FILENAME"
            echo ""
            echo "🚀 شروع دانلود..."
            
            # ساخت هدرها
            HEADER_OPTS=(
              --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
              --header="Accept: */*"
              --header="Accept-Language: en-US,en;q=0.9"
              --header="Accept-Encoding: identity"
              --header="Connection: keep-alive"
              --header="Cache-Control: no-cache"
              --header="Sec-Fetch-Dest: video"
              --header="Sec-Fetch-Mode: no-cors"
              --header="Sec-Fetch-Site: cross-site"
              --referer="$page_url"
              --header="Referer: $page_url"
              --header="Origin: https://sxyprn.com"
            )
            
            # دانلود با aria2
            aria2c \
              "$VIDEO_URL" \
              --out="downloads/$FILENAME" \
              --max-connection-per-server=8 \
              --split=8 \
              --min-split-size=1M \
              --connect-timeout=30 \
              --timeout=600 \
              --max-tries=3 \
              --retry-wait=5 \
              --continue=true \
              --allow-overwrite=false \
              --auto-file-renaming=false \
              --file-allocation=none \
              --disk-cache=64M \
              --summary-interval=5 \
              --console-log-level=notice \
              "${HEADER_OPTS[@]}" \
              2>&1 | tee "/tmp/aria2_${INDEX}.log"
            
            ARIA_EXIT=${PIPESTATUS[0]}
            
            # Fallback to curl
            if [ $ARIA_EXIT -ne 0 ] || [ ! -f "downloads/$FILENAME" ] || [ $(stat -c%s "downloads/$FILENAME" 2>/dev/null || echo 0) -lt 102400 ]; then
              echo ""
              echo "⚠️ تلاش با curl..."
              curl -L \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -H "Referer: $page_url" \
                -H "Origin: https://sxyprn.com" \
                --connect-timeout 30 \
                --max-time 600 \
                -o "downloads/$FILENAME" \
                "$VIDEO_URL" 2>&1
              
              # Fallback to wget
              if [ ! -f "downloads/$FILENAME" ] || [ $(stat -c%s "downloads/$FILENAME" 2>/dev/null || echo 0) -lt 102400 ]; then
                echo ""
                echo "⚠️ تلاش با wget..."
                wget \
                  --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                  --referer="$page_url" \
                  --header="Origin: https://sxyprn.com" \
                  --tries=3 \
                  --timeout=60 \
                  --no-check-certificate \
                  -O "downloads/$FILENAME" \
                  "$VIDEO_URL" 2>&1
              fi
            fi
            
            # بررسی نتیجه
            if [ -f "downloads/$FILENAME" ]; then
              SIZE=$(stat -c%s "downloads/$FILENAME" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 102400 ]; then
                echo ""
                echo "✅ [$INDEX] موفق: $FILENAME ($(numfmt --to=iec $SIZE))"
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
              else
                echo ""
                echo "❌ [$INDEX] حجم کم: $SIZE بایت"
                head -c 200 "downloads/$FILENAME" 2>/dev/null | cat -v
                rm -f "downloads/$FILENAME"
                FAILED_LIST="$FAILED_LIST\n- [$INDEX] $page_url (حجم غیرعادی: ${SIZE} بایت)"
              fi
            else
              echo ""
              echo "❌ [$INDEX] دانلود ناموفق"
              FAILED_LIST="$FAILED_LIST\n- [$INDEX] $page_url (خطا در دانلود)"
            fi
            
            echo ""
          done
          
          echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "TOTAL_SIZE=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          
          # بسته‌بندی فایل‌های دیباگ
          if ls /tmp/page_*.html 1> /dev/null 2>&1; then
            tar czf /tmp/pages_html.tar.gz /tmp/page_*.html 2>/dev/null || true
          fi
          
          # ایجاد گزارش
          {
            echo "# 📊 گزارش دانلود SxyPrn"
            echo ""
            echo "**زمان:** $(date '+%Y-%m-%d %H:%M:%S')"
            echo ""
            echo "| مورد | مقدار |"
            echo "|------|-------|"
            echo "| کل صفحات | $INDEX |"
            echo "| دانلود موفق | $SUCCESS_COUNT |"
            echo "| حجم کل | $(numfmt --to=iec $TOTAL_SIZE) |"
            echo ""
            
            if [ $SUCCESS_COUNT -gt 0 ]; then
              echo "## ✅ ویدیوهای دانلود شده"
              echo ""
              echo "| # | نام فایل | حجم |"
              echo "|---|----------|-----|"
              count=1
              for f in downloads/*; do
                if [ -f "$f" ]; then
                  echo "| $count | \`$(basename "$f")\` | $(numfmt --to=iec $(stat -c%s "$f")) |"
                  count=$((count + 1))
                fi
              done
            fi
            
            if [ -n "$FAILED_LIST" ]; then
              echo ""
              echo "## ❌ خطاها"
              echo -e "$FAILED_LIST"
              echo ""
              echo "💡 **راهنمایی:**"
              echo "- فایل debug-data رو از Artifacts دانلود کن"
              echo "- HTML صفحه رو بررسی کن تا لینک ویدیو رو دستی پیدا کنی"
            fi
          } > download_report.md
          
          if [ "$SUCCESS_COUNT" -eq 0 ]; then
            echo "❌ هیچ ویدیویی دانلود نشد!"
            exit 1
          fi

      - name: Show downloads
        run: |
          echo "📁 فایل‌های دانلود شده:"
          du -sh downloads/ 2>/dev/null || echo "خالی"
          ls -lh downloads/ 2>/dev/null || echo "بدون فایل"

      - name: Create Release
        if: steps.download.outputs.SUCCESS_COUNT != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sxyprn-${{ github.run_number }}
          name: 🎬 SxyPrn Videos #${{ github.run_number }}
          body_path: download_report.md
          files: |
            downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-data-${{ github.run_number }}
          path: |
            /tmp/pages_html.tar.gz
            /tmp/aria2_*.log
            download_report.md
          retention-days: 3
