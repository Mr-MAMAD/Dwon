name: Magnet Downloader

on:
  workflow_dispatch:
    inputs:
      magnets:
        description: 'Magnet links (one per line)'
        required: true
        type: string

      timeout:
        description: 'Download timeout per active magnet (minutes)'
        required: false
        default: '60'
        type: string

      peer_wait:
        description: 'Wait for peers before skipping (seconds)'
        required: false
        default: '180'
        type: string

      connections:
        description: 'Connections'
        required: false
        default: '16'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install aria2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 curl zip

      - name: Download Magnets
        id: dl
        shell: bash
        run: |
          set +e

          MAGNETS="${{ github.event.inputs.magnets }}"
          TIMEOUT_MIN="${{ github.event.inputs.timeout }}"
          PEER_WAIT="${{ github.event.inputs.peer_wait }}"
          CONN="${{ github.event.inputs.connections }}"

          mkdir -p downloads
          mkdir -p release

          SUCCESS=0
          INDEX=0
          TOTAL=0
          FAILED=""

          while IFS= read -r magnet; do

            magnet=$(echo "$magnet" | xargs)

            [ -z "$magnet" ] && continue

            INDEX=$((INDEX+1))

            echo ""
            echo "===================================="
            echo "MAGNET #$INDEX"
            echo "===================================="

            touch "/tmp/log_${INDEX}.txt"

            BEFORE=$(mktemp)
            find downloads -type f > "$BEFORE"

            timeout "${PEER_WAIT}" aria2c \
              "$magnet" \
              --dir=downloads \
              --seed-time=0 \
              --bt-max-peers=200 \
              --split="$CONN" \
              --enable-dht=true \
              --enable-peer-exchange=true \
              --bt-stop-timeout=120 \
              --max-tries=0 \
              --summary-interval=10 \
              --console-log-level=notice \
              2>&1 | tee "/tmp/log_${INDEX}.txt"

            AFTER=$(mktemp)
            find downloads -type f > "$AFTER"

            NEWFILE=$(
              comm -13 "$BEFORE" "$AFTER" |
              head -1
            )

            rm -f "$BEFORE" "$AFTER"

            if [ -z "$NEWFILE" ]; then

              echo "No metadata / peers found."
              FAILED="${FAILED}\n- Magnet #${INDEX} (no peers)"

              pkill aria2c || true

              continue

            fi

            echo "Peers detected. Starting full download..."

            timeout "${TIMEOUT_MIN}m" aria2c \
              "$magnet" \
              --dir=downloads \
              --seed-time=0 \
              --bt-max-peers=200 \
              --split="$CONN" \
              --enable-dht=true \
              --enable-peer-exchange=true \
              --bt-stop-timeout=300 \
              --max-tries=0 \
              --summary-interval=30 \
              --console-log-level=notice \
              2>&1 | tee -a "/tmp/log_${INDEX}.txt"

            FILE=$(
              find downloads -type f \
                -printf '%s %p\n' |
                sort -nr |
                head -1 |
                cut -d' ' -f2-
            )

            if [ -z "$FILE" ]; then

              FAILED="${FAILED}\n- Magnet #${INDEX} (download failed)"
              continue

            fi

            SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)

            if [ "$SIZE" -lt 1048576 ]; then

              FAILED="${FAILED}\n- $(basename "$FILE") (too small)"
              rm -f "$FILE"

              continue

            fi

            NAME=$(basename "$FILE")

            cp "$FILE" "release/$NAME"

            SUCCESS=$((SUCCESS+1))
            TOTAL=$((TOTAL+SIZE))

            echo "Downloaded: $NAME"
            echo "Size: $(numfmt --to=iec "$SIZE")"

          done <<< "$MAGNETS"

          echo "SUCCESS=$SUCCESS" >> "$GITHUB_OUTPUT"

          {
            echo "# Download Report"
            echo
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Successful | $SUCCESS/$INDEX |"
            echo "| Total Size | $(numfmt --to=iec "$TOTAL") |"

            if [ -n "$FAILED" ]; then
              echo
              echo "## Failed"
              echo -e "$FAILED"
            fi

          } > report.md

          if [ "$SUCCESS" -eq 0 ]; then
            exit 1
          fi

      - name: Create Archive
        if: steps.dl.outputs.SUCCESS != '0'
        run: |
          cd release
          zip -r ../release.zip .
          cd ..

      - name: Create Release
        if: steps.dl.outputs.SUCCESS != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dl-${{ github.run_number }}
          files: release.zip
          body_path: report.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: /tmp/log_*.txt
          retention-days: 3
