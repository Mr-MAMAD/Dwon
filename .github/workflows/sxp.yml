name: sxp

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (هر خط یک لینک)'
        required: true
        type: string
      connections:
        description: 'تعداد اتصال موازی برای هر فایل (پیش‌فرض: 8)'
        required: false
        default: '8'
        type: string

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install aria2 (fast parallel downloader)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download files with aria2
        id: download
        run: |
          # تبدیل لینک‌ها به آرایه
          mapfile -t URL_ARRAY <<< "${{ github.event.inputs.urls }}"
          
          CONNECTIONS="${{ github.event.inputs.connections }}"
          SUCCESS_COUNT=0
          FAILED_URLS=""
          DOWNLOADED_FILES=""
          
          # فایل موقت برای لیست دانلودهای aria2
          ARIA_LIST="/tmp/aria_list.txt"
          > "$ARIA_LIST"
          
          # پردازش لینک‌ها و ایجاد لیست برای aria2
          declare -a VALID_URLS=()
          declare -a OUTPUT_NAMES=()
          INDEX=0
          
          for url in "${URL_ARRAY[@]}"; do
            # حذف فاصله‌های اضافی و خطوط خالی
            url=$(echo "$url" | xargs)
            if [ -z "$url" ]; then
              continue
            fi
            
            echo "----------------------------------------"
            echo "🔗 پردازش لینک: $url"
            
            # استخراج نام فایل از URL
            filename=$(basename "$url" | cut -d'?' -f1 | sed 's/[^a-zA-Z0-9._-]/_/g')
            if [ -z "$filename" ] || [ "$filename" = "/" ] || [ ${#filename} -lt 4 ]; then
              filename="file_$(date +%s%N | sha256sum | head -c 8).mp4"
            fi
            
            # جلوگیری از overwrite
            original_filename="$filename"
            counter=1
            while [ -f "downloads/$filename" ] || [[ " ${OUTPUT_NAMES[*]} " =~ " ${filename} " ]]; do
              base="${original_filename%.*}"
              ext="${original_filename##*.}"
              filename="${base}_${counter}.${ext}"
              counter=$((counter + 1))
            done
            
            # اضافه کردن به لیست aria2
            echo "$url" >> "$ARIA_LIST"
            echo "  out=downloads/$filename" >> "$ARIA_LIST"
            
            VALID_URLS+=("$url")
            OUTPUT_NAMES+=("$filename")
            INDEX=$((INDEX + 1))
          done
          
          TOTAL_URLS=${#VALID_URLS[@]}
          
          if [ "$TOTAL_URLS" -eq 0 ]; then
            echo "❌ هیچ لینک معتبری وارد نشده!"
            exit 1
          fi
          
          echo "=========================================="
          echo "📥 شروع دانلود $TOTAL_URLS فایل با $CONNECTIONS اتصال موازی..."
          echo "=========================================="
          
          # دانلود با aria2
          # -x: تعداد اتصالات به ازای هر فایل
          # -s: تقسیم فایل به بخش‌های مجزا
          # -j: تعداد دانلود همزمان
          # -c: ادامه دانلود ناقص
          # --max-connection-per-server: حداکثر اتصال به یک سرور
          # --min-split-size: حداقل سایز برای تقسیم (1MB)
          # --console-log-level=notice: نمایش پیشرفت
          
          aria2c \
            --input-file="$ARIA_LIST" \
            --max-concurrent-downloads=5 \
            --max-connection-per-server=16 \
            --split="$CONNECTIONS" \
            --min-split-size=1M \
            --connect-timeout=30 \
            --timeout=600 \
            --max-tries=5 \
            --retry-wait=3 \
            --continue=true \
            --allow-overwrite=false \
            --auto-file-renaming=false \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --summary-interval=0 \
            --console-log-level=notice \
            2>&1 | tee /tmp/aria2_output.log
          
          ARIA_EXIT_CODE=${PIPESTATUS[0]}
          
          # بررسی نتایج
          echo "=========================================="
          echo "📊 بررسی نتایج دانلود:"
          echo "=========================================="
          
          for i in "${!VALID_URLS[@]}"; do
            url="${VALID_URLS[$i]}"
            filename="${OUTPUT_NAMES[$i]}"
            
            if [ -f "downloads/$filename" ]; then
              FILE_SIZE=$(stat -c%s "downloads/$filename" 2>/dev/null || echo 0)
              if [ "$FILE_SIZE" -gt 10240 ]; then
                HUMAN_SIZE=$(numfmt --to=iec $FILE_SIZE)
                echo "✅ [$((i+1))/$TOTAL_URLS] $filename ($HUMAN_SIZE)"
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                DOWNLOADED_FILES="$DOWNLOADED_FILES,$filename"
              else
                echo "⚠️ [$((i+1))/$TOTAL_URLS] $filename - فایل خیلی کوچک (${FILE_SIZE} بایت)"
                rm -f "downloads/$filename"
                FAILED_URLS="$FAILED_URLS\n- $url (سایز: ${FILE_SIZE} بایت - احتمالاً خراب)"
              fi
            else
              echo "❌ [$((i+1))/$TOTAL_URLS] $filename - دانلود نشد"
              FAILED_URLS="$FAILED_URLS\n- $url (دانلود ناموفق)"
            fi
          done
          
          echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "DOWNLOADED_FILES=$DOWNLOADED_FILES" >> $GITHUB_OUTPUT
          echo "TOTAL_URLS=$TOTAL_URLS" >> $GITHUB_OUTPUT
          
          # ایجاد گزارش
          {
            echo "# گزارش دانلود 🚀"
            echo ""
            echo "**تاریخ:** $(date '+%Y-%m-%d %H:%M:%S')"
            echo ""
            echo "**تعداد کل لینک‌ها:** $TOTAL_URLS"
            echo ""
            echo "**دانلود موفق:** $SUCCESS_COUNT"
            echo ""
            echo "**اتصالات موازی:** $CONNECTIONS"
            echo ""
            
            if [ "$SUCCESS_COUNT" -gt 0 ]; then
              echo "## فایل‌های دانلود شده ✅"
              echo ""
              while IFS= read -r file; do
                if [ -n "$file" ]; then
                  size=$(stat -c%s "downloads/$file" 2>/dev/null || echo 0)
                  echo "- 📁 \`$file\` ($(numfmt --to=iec $size))"
                fi
              done <<< "$(echo "$DOWNLOADED_FILES" | tr ',' '\n' | tail -n +2)"
              echo ""
            fi
            
            if [ -n "$FAILED_URLS" ]; then
              echo "## لینک‌های ناموفق ❌"
              echo ""
              echo -e "$FAILED_URLS"
              echo ""
            fi
            
            echo "---"
            echo "💡 **نکته:** از aria2 برای دانلود سریع استفاده شده"
          } > download_report.md
          
          echo "=========================================="
          echo "📈 خلاصه: $SUCCESS_COUNT از $TOTAL_URLS فایل با موفقیت دانلود شد"
          echo "=========================================="
          
          if [ "$SUCCESS_COUNT" -eq 0 ]; then
            echo "❌ هیچ فایلی دانلود نشد - Release ساخته نمی‌شود"
            exit 1
          fi

      - name: Show downloaded files
        run: |
          echo "📁 فایل‌های دانلود شده:"
          echo "========================"
          ls -lha downloads/
          echo ""
          echo "📊 حجم کل:"
          du -sh downloads/

      - name: Create Release
        if: steps.download.outputs.SUCCESS_COUNT != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          name: 🚀 Release #${{ github.run_number }} (${{ steps.download.outputs.SUCCESS_COUNT }}/${{ steps.download.outputs.TOTAL_URLS }} files)
          body_path: download_report.md
          files: |
            downloads/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: download-report-${{ github.run_number }}
          path: download_report.md
          retention-days: 7
