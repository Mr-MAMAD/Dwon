name: Magnet Downloader

on:
  workflow_dispatch:
    inputs:
      magnets:
        description: 'Magnet links (one per line)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install aria2
        run: sudo apt-get update -qq && sudo apt-get install -y -qq aria2
      
      - name: Download
        run: |
          mkdir -p downloads
          
          echo "${{ github.event.inputs.magnets }}" | while IFS= read -r magnet; do
            [ -z "$magnet" ] && continue
            
            echo "Downloading: ${magnet:0:80}..."
            
            aria2c \
              "$magnet" \
              --dir=downloads \
              --seed-time=0 \
              --max-upload-limit=10K \
              --bt-max-peers=50 \
              --split=8 \
              --enable-dht=true \
              --bt-stop-timeout=300 \
              --timeout=300 \
              2>&1 || echo "Failed, moving to next..."
            
            echo "Done, next..."
          done
          
          ls -lh downloads/
          
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: download-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
