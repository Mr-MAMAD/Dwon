name: dood download Videos

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'One URL per line'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          python3 -m pip install -U yt-dlp

      - name: Download videos
        run: |
          mkdir -p downloads

          cat << 'EOF' > urls.txt
          ${{ github.event.inputs.urls }}
          EOF

          counter=1

          while IFS= read -r url || [ -n "$url" ]; do
            [ -z "$url" ] && continue

            echo "Downloading: $url"

            yt-dlp \
              --merge-output-format mp4 \
              -o "downloads/video_${counter}.%(ext)s" \
              "$url"

            counter=$((counter+1))
          done < urls.txt

      - name: Create archive
        run: zip -r videos.zip downloads

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: run-${{ github.run_number }}
          files: videos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
