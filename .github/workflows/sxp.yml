name: s DL Release

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Direct URLs (Separate with space, comma, or new line)"
        required: true
        type: string

      cookie:
        description: "Cookie Header (Optional)"
        required: false
        type: string
        default: ""

      referer:
        description: "Referer (Optional)"
        required: false
        type: string
        default: "https://trafficdeposit.com/"

      password:
        description: "ZIP Password (Optional)"
        required: false
        type: string
        default: ""

jobs:
  direct-download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2 curl zip p7zip-full

      - name: Download Files
        shell: bash
        run: |
          set +e

          RAW_URLS="${{ github.event.inputs.url }}"
          COOKIE="${{ github.event.inputs.cookie }}"
          REFERER="${{ github.event.inputs.referer }}"

          rm -rf tmp_downloads
          rm -rf upload

          mkdir -p tmp_downloads
          mkdir -p upload

          SUCCESS_FILE="upload/success.txt"
          FAILED_FILE="upload/failed.txt"

          > "$SUCCESS_FILE"
          > "$FAILED_FILE"

          IFS=$'\n ,'
          read -ra URLS <<< "$RAW_URLS"

          INDEX=1

          for URL in "${URLS[@]}"; do

            if [ -z "$URL" ]; then
              continue
            fi

            echo "======================================"
            echo "Downloading [$INDEX]: $URL"
            echo "======================================"

            FILENAME=$(basename "$URL")

            ARIA_ARGS=(
              --split=1
              --max-connection-per-server=1
              --max-tries=5
              --retry-wait=10
              --continue=true
              --timeout=60
              --auto-file-renaming=true
              --dir=tmp_downloads
              --header=User-Agent:\ Mozilla/5.0
            )

            if [ -n "$REFERER" ]; then
              ARIA_ARGS+=(--referer="$REFERER")
            fi

            if [ -n "$COOKIE" ]; then
              ARIA_ARGS+=(--header="Cookie: $COOKIE")
            fi

            aria2c "${ARIA_ARGS[@]}" "$URL"

            STATUS=$?

            if [ $STATUS -ne 0 ]; then

              echo "aria2 failed, trying curl..."

              CURL_ARGS=(
                -L
                -A "Mozilla/5.0"
                --retry 5
                --connect-timeout 60
              )

              if [ -n "$REFERER" ]; then
                CURL_ARGS+=(-e "$REFERER")
              fi

              if [ -n "$COOKIE" ]; then
                CURL_ARGS+=(-H "Cookie: $COOKIE")
              fi

              curl "${CURL_ARGS[@]}" \
                -o "tmp_downloads/$FILENAME" \
                "$URL"

              STATUS=$?
            fi

            FILE_PATH="tmp_downloads/$FILENAME"

            if [ $STATUS -eq 0 ] && [ -f "$FILE_PATH" ] && [ -s "$FILE_PATH" ]; then
              echo "SUCCESS: $URL"
              echo "$URL" >> "$SUCCESS_FILE"
            else
              echo "FAILED: $URL"
              echo "$URL" >> "$FAILED_FILE"
            fi

            INDEX=$((INDEX + 1))

          done

          set -e

      - name: Prepare Files
        shell: bash
        run: |
          PASS="${{ github.event.inputs.password }}"
          LIMIT=$((2 * 1024 * 1024 * 1024))

          for FILE in tmp_downloads/*; do

            if [ ! -f "$FILE" ]; then
              continue
            fi

            if [ ! -s "$FILE" ]; then
              continue
            fi

            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then

              echo "Large file detected: $BASENAME"

              if [ -n "$PASS" ]; then
                7z a -v2g -p"$PASS" -mhe=on "upload/${BASENAME}.7z" "$FILE"
              else
                7z a -v2g "upload/${BASENAME}.7z" "$FILE"
              fi

            else

              if [ -n "$PASS" ]; then

                echo "Creating password protected archive: $BASENAME"

                7z a -p"$PASS" -mhe=on "upload/${BASENAME}.7z" "$FILE"

              else

                echo "Keeping original file: $BASENAME"

                cp "$FILE" "upload/$BASENAME"

              fi

            fi

          done

          rm -rf tmp_downloads

      - name: Remove invalid files
        shell: bash
        run: |
          find upload -type f -empty -delete

      - name: Generate Release Info
        id: meta
        shell: bash
        run: |
          TAG="run-$(date +%Y%m%d-%H%M%S)"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          echo "## Download Report" > body.md
          echo "" >> body.md

          echo "### Successful Downloads" >> body.md

          if [ -f upload/success.txt ]; then
            while read LINE; do
              echo "- $LINE" >> body.md
            done < upload/success.txt
          fi

          echo "" >> body.md

          echo "### Failed Downloads" >> body.md

          if [ -f upload/failed.txt ]; then
            while read LINE; do
              echo "- $LINE" >> body.md
            done < upload/failed.txt
          fi

          echo "" >> body.md

          echo "### Uploaded Files" >> body.md

          for FILE in upload/*; do
            if [ -f "$FILE" ]; then
              NAME=$(basename "$FILE")
              echo "- $NAME" >> body.md
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Download ${{ steps.meta.outputs.tag }}
          body_path: body.md
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
