name: Magnet Torrent Downloader

on:
  workflow_dispatch:
    inputs:
      magnets:
        description: 'لینک‌های مگنت (هر خط یک لینک)'
        required: true
        type: string
      split_size:
        description: 'حجم هر تکه (مثلاً 1900M)'
        required: false
        default: '1900M'
        type: string
      timeout_minutes:
        description: 'حداکثر زمان انتظار برای هر مگنت (دقیقه)'
        required: false
        default: '15'
        type: string

jobs:
  download-torrents:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 curl

      - name: Download and split torrents
        id: download
        shell: bash
        run: |
          set +e
          
          MAGNETS="${{ github.event.inputs.magnets }}"
          SPLIT_SIZE="${{ github.event.inputs.split_size }}"
          TIMEOUT_MINUTES="${{ github.event.inputs.timeout_minutes }}"
          TIMEOUT_SECONDS=$((TIMEOUT_MINUTES * 60))
          
          SUCCESS_COUNT=0
          FAILED_LIST=""
          TOTAL_SIZE=0
          
          mkdir -p downloads splitted
          
          INDEX=0
          
          while IFS= read -r magnet; do
            magnet=$(echo "$magnet" | xargs)
            if [ -z "$magnet" ]; then
              continue
            fi
            
            INDEX=$((INDEX + 1))
            
            echo "=========================================="
            echo "[$INDEX] Magnet: ${magnet:0:100}..."
            echo "Timeout: ${TIMEOUT_MINUTES} minutes"
            echo "=========================================="
            
            FILENAME=$(echo "$magnet" | grep -oP 'dn=\K[^&]+' 2>/dev/null | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null)
            
            if [ -z "$FILENAME" ]; then
              HASH=$(echo "$magnet" | grep -oP 'btih:\K[^&]+' 2>/dev/null)
              FILENAME="torrent_${HASH:0:10}.mp4"
            fi
            
            CLEAN_NAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g' | sed 's/__\+/_/g')
            BASE_NAME="${CLEAN_NAME%.*}"
            
            echo "File: $CLEAN_NAME"
            echo "Starting download..."
            
            # Start aria2 in background
            aria2c \
              "$magnet" \
              --dir="downloads" \
              --out="$CLEAN_NAME" \
              --seed-time=0 \
              --max-upload-limit=10K \
              --bt-max-peers=100 \
              --bt-request-peer-speed-limit=50M \
              --max-concurrent-downloads=5 \
              --split=16 \
              --min-split-size=1M \
              --connect-timeout=30 \
              --timeout=60 \
              --max-tries=0 \
              --retry-wait=5 \
              --continue=true \
              --allow-overwrite=false \
              --auto-file-renaming=false \
              --file-allocation=none \
              --disk-cache=128M \
              --summary-interval=10 \
              --console-log-level=notice \
              --enable-dht=true \
              --enable-dht6=false \
              --enable-peer-exchange=true \
              --bt-enable-lpd=true \
              --bt-tracker-connect-timeout=10 \
              --bt-tracker-timeout=10 \
              --bt-stop-timeout=60 \
              2>&1 | tee "/tmp/aria2_${INDEX}.log" &
            
            ARIA_PID=$!
            
            START_TIME=$(date +%s)
            LAST_SIZE=0
            STUCK_COUNT=0
            
            while kill -0 $ARIA_PID 2>/dev/null; do
              CURRENT_TIME=$(date +%s)
              ELAPSED=$((CURRENT_TIME - START_TIME))
              
              if [ "$ELAPSED" -gt "$TIMEOUT_SECONDS" ]; then
                echo ""
                echo "Timeout reached (${TIMEOUT_MINUTES} minutes)"
                
                if [ -f "downloads/$CLEAN_NAME" ]; then
                  SIZE=$(stat -c%s "downloads/$CLEAN_NAME" 2>/dev/null || echo 0)
                  if [ "$SIZE" -gt 1048576 ]; then
                    echo "Partial download: $(numfmt --to=iec $SIZE)"
                  else
                    echo "No data downloaded"
                    rm -f "downloads/$CLEAN_NAME"
                  fi
                fi
                
                kill -9 $ARIA_PID 2>/dev/null
                break
              fi
              
              if [ -f "downloads/$CLEAN_NAME" ]; then
                CURRENT_SIZE=$(stat -c%s "downloads/$CLEAN_NAME" 2>/dev/null || echo 0)
                if [ "$CURRENT_SIZE" -eq "$LAST_SIZE" ] && [ "$ELAPSED" -gt 300 ]; then
                  STUCK_COUNT=$((STUCK_COUNT + 1))
                  if [ "$STUCK_COUNT" -gt 6 ]; then
                    echo ""
                    echo "Download stuck - no progress for 60 seconds"
                    kill -9 $ARIA_PID 2>/dev/null
                    break
                  fi
                else
                  STUCK_COUNT=0
                fi
                LAST_SIZE=$CURRENT_SIZE
              fi
              
              if [ $((ELAPSED % 30)) -eq 0 ]; then
                echo "  [$((ELAPSED/60))min] Downloading..."
              fi
              
              sleep 10
            done
            
            wait $ARIA_PID 2>/dev/null
            
            # Check result
            DOWNLOADED_FILE="downloads/$CLEAN_NAME"
            
            if [ ! -f "$DOWNLOADED_FILE" ]; then
              DOWNLOADED_FILE=$(find downloads -type f -newer "/tmp/aria2_${INDEX}.log" -size +100k 2>/dev/null | head -1)
            fi
            
            if [ -f "$DOWNLOADED_FILE" ]; then
              SIZE=$(stat -c%s "$DOWNLOADED_FILE" 2>/dev/null || echo 0)
              HUMAN_SIZE=$(numfmt --to=iec $SIZE 2>/dev/null)
              
              if [ "$SIZE" -gt 102400 ]; then
                echo ""
                echo "[$INDEX] Downloaded: $(basename "$DOWNLOADED_FILE") ($HUMAN_SIZE)"
                
                MAX_SIZE=$((2 * 1024 * 1024 * 1024))
                
                if [ "$SIZE" -gt "$MAX_SIZE" ]; then
                  echo "Splitting into ${SPLIT_SIZE} parts..."
                  
                  SPLIT_DIR="splitted/${BASE_NAME}"
                  mkdir -p "$SPLIT_DIR"
                  
                  split -d -b "$SPLIT_SIZE" "$DOWNLOADED_FILE" "${SPLIT_DIR}/${BASE_NAME}.part"
                  
                  md5sum "$DOWNLOADED_FILE" > "${SPLIT_DIR}/checksum.md5"
                  
                  cat > "${SPLIT_DIR}/info.txt" << EOF
Original: $CLEAN_NAME
Size: $HUMAN_SIZE ($SIZE bytes)
Parts: $(ls "${SPLIT_DIR}"/*.part* 2>/dev/null | wc -l)

Join in Windows:
  copy /b part00 + part01 + ... $CLEAN_NAME

Join in Linux/Mac:
  cat part* > $CLEAN_NAME
  md5sum -c checksum.md5
EOF
                  
                  echo "Parts:"
                  ls -lh "$SPLIT_DIR"/
                  
                  rm -f "$DOWNLOADED_FILE"
                else
                  cp "$DOWNLOADED_FILE" "splitted/$CLEAN_NAME"
                fi
                
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
                
              else
                echo ""
                echo "[$INDEX] File too small: $SIZE bytes"
                rm -f "$DOWNLOADED_FILE"
                FAILED_LIST="$FAILED_LIST\n- $CLEAN_NAME ($SIZE bytes)"
              fi
            else
              echo ""
              echo "[$INDEX] Download failed - no seeders"
              FAILED_LIST="$FAILED_LIST\n- $CLEAN_NAME (no seeders)"
            fi
            
            echo ""
            echo "--- Moving to next magnet ---"
            echo ""
            
          done <<< "$MAGNETS"
          
          echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "TOTAL_SIZE=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          
          {
            echo "# Download Report"
            echo ""
            echo "**Time:** $(date '+%Y-%m-%d %H:%M:%S')"
            echo "**Timeout:** ${TIMEOUT_MINUTES} minutes"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Total | $INDEX |"
            echo "| Success | $SUCCESS_COUNT |"
            echo "| Failed | $((INDEX - SUCCESS_COUNT)) |"
            echo "| Total Size | $(numfmt --to=iec $TOTAL_SIZE) |"
            echo ""
            
            if [ $SUCCESS_COUNT -gt 0 ]; then
              echo "## Downloaded Files"
              echo ""
              for f in splitted/*; do
                if [ -f "$f" ]; then
                  echo "- $(basename "$f") ($(numfmt --to=iec $(stat -c%s "$f")))"
                elif [ -d "$f" ]; then
                  echo "- $(basename "$f") ($(ls "$f"/*.part* 2>/dev/null | wc -l) parts)"
                fi
              done
            fi
            
            if [ -n "$FAILED_LIST" ]; then
              echo ""
              echo "## Failed"
              echo -e "$FAILED_LIST"
            fi
          } > download_report.md
          
          if [ "$SUCCESS_COUNT" -eq 0 ]; then
            echo "No files downloaded!"
            exit 1
          fi

      - name: Show results
        run: |
          echo "Downloads:"
          du -sh downloads/ 2>/dev/null || echo "empty"
          ls -lh downloads/ 2>/dev/null || echo "no files"
          echo ""
          echo "Splitted:"
          du -sh splitted/ 2>/dev/null || echo "empty"
          ls -lhR splitted/ 2>/dev/null || echo "no files"

      - name: Create Release
        if: steps.download.outputs.SUCCESS_COUNT != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: torrent-${{ github.run_number }}
          name: Torrent Download ${{ github.run_number }}
          body_path: download_report.md
          files: |
            splitted/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: torrent-logs-${{ github.run_number }}
          path: |
            /tmp/aria2_*.log
            download_report.md
          retention-days: 3
