name: sxp DL Release PRO

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URLs (space/comma/newline separated)"
        required: true
        type: string

      cookie:
        description: "Cookie Header (Optional)"
        required: false
        type: string
        default: ""

      referer:
        description: "Referer (Optional)"
        required: false
        type: string
        default: ""

      password:
        description: "Archive Password (Optional)"
        required: false
        type: string
        default: ""

jobs:
  direct-download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        shell: bash
        run: |
          sudo apt-get update -qq

          sudo apt-get install -y \
            aria2 \
            curl \
            ffmpeg \
            p7zip-full \
            mediainfo \
            jq

          sudo curl -L \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp

          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Prepare Workspace
        shell: bash
        run: |
          rm -rf tmp_downloads
          rm -rf upload

          mkdir -p tmp_downloads
          mkdir -p upload

          touch upload/success.txt
          touch upload/failed.txt

      - name: Download Files
        shell: bash
        run: |
          set +e

          RAW_URLS="${{ github.event.inputs.url }}"
          COOKIE="${{ github.event.inputs.cookie }}"
          REFERER="${{ github.event.inputs.referer }}"

          IFS=$'\n ,'
          read -ra URLS <<< "$RAW_URLS"

          INDEX=1

          for URL in "${URLS[@]}"; do

            if [ -z "$URL" ]; then
              continue
            fi

            echo ""
            echo "=================================================="
            echo "DOWNLOAD [$INDEX]"
            echo "$URL"
            echo "=================================================="

            SAFE_NAME="file_${INDEX}"

            YTDLP_ARGS=(
              --no-part
              --no-playlist
              --restrict-filenames
              --newline
              -o "tmp_downloads/${SAFE_NAME}.%(ext)s"
            )

            if [ -n "$REFERER" ]; then
              YTDLP_ARGS+=(--add-header "Referer:$REFERER")
            fi

            if [ -n "$COOKIE" ]; then
              YTDLP_ARGS+=(--add-header "Cookie:$COOKIE")
            fi

            YTDLP_ARGS+=(--add-header "User-Agent:Mozilla/5.0")

            echo "Trying yt-dlp..."

            yt-dlp "${YTDLP_ARGS[@]}" "$URL"

            STATUS=$?

            if [ $STATUS -ne 0 ]; then

              echo "yt-dlp failed"
              echo "Trying aria2..."

              ARIA_ARGS=(
                --split=1
                --max-connection-per-server=1
                --max-tries=5
                --retry-wait=10
                --continue=true
                --timeout=60
                --auto-file-renaming=true
                --dir=tmp_downloads
                --header=User-Agent:\ Mozilla/5.0
              )

              if [ -n "$REFERER" ]; then
                ARIA_ARGS+=(--referer="$REFERER")
              fi

              if [ -n "$COOKIE" ]; then
                ARIA_ARGS+=(--header="Cookie: $COOKIE")
              fi

              aria2c "${ARIA_ARGS[@]}" "$URL"

              STATUS=$?
            fi

            if [ $STATUS -ne 0 ]; then

              echo "aria2 failed"
              echo "Trying curl..."

              FILE_EXT=$(echo "$URL" | awk -F. '{print $NF}')
              OUTPUT_FILE="tmp_downloads/${SAFE_NAME}.${FILE_EXT}"

              CURL_ARGS=(
                -L
                -A "Mozilla/5.0"
                --retry 5
                --connect-timeout 60
              )

              if [ -n "$REFERER" ]; then
                CURL_ARGS+=(-e "$REFERER")
              fi

              if [ -n "$COOKIE" ]; then
                CURL_ARGS+=(-H "Cookie: $COOKIE")
              fi

              curl "${CURL_ARGS[@]}" \
                -o "$OUTPUT_FILE" \
                "$URL"

              STATUS=$?
            fi

            echo ""
            echo "Checking downloaded files..."

            VALID_FOUND=0

            for FILE in tmp_downloads/*; do

              if [ ! -f "$FILE" ]; then
                continue
              fi

              if [ ! -s "$FILE" ]; then
                rm -f "$FILE"
                continue
              fi

              MIME=$(file --mime-type -b "$FILE")

              echo "FILE: $FILE"
              echo "MIME: $MIME"

              case "$MIME" in
                text/html|text/plain|application/json)
                  echo "Fake file detected -> removing"
                  rm -f "$FILE"
                  ;;
                *)
                  VALID_FOUND=1
                  ;;
              esac

            done

            if [ "$VALID_FOUND" -eq 1 ]; then
              echo "SUCCESS: $URL"
              echo "$URL" >> upload/success.txt
            else
              echo "FAILED: $URL"
              echo "$URL" >> upload/failed.txt
            fi

            INDEX=$((INDEX + 1))

          done

          set -e

      - name: Show File Info
        shell: bash
        run: |
          echo "================ FILE INFO ================"

          for FILE in tmp_downloads/*; do

            if [ ! -f "$FILE" ]; then
              continue
            fi

            echo ""
            echo "FILE: $FILE"

            file "$FILE" || true

            mediainfo "$FILE" || true

          done

      - name: Prepare Uploads
        shell: bash
        run: |
          PASS="${{ github.event.inputs.password }}"
          LIMIT=$((2 * 1024 * 1024 * 1024))

          for FILE in tmp_downloads/*; do

            if [ ! -f "$FILE" ]; then
              continue
            fi

            if [ ! -s "$FILE" ]; then
              continue
            fi

            BASENAME=$(basename "$FILE")
            SIZE=$(stat -c%s "$FILE")

            echo ""
            echo "Preparing: $BASENAME"

            if [ "$SIZE" -gt "$LIMIT" ]; then

              echo "Large file -> split archive"

              if [ -n "$PASS" ]; then

                7z a \
                  -v2g \
                  -p"$PASS" \
                  -mhe=on \
                  "upload/${BASENAME}.7z" \
                  "$FILE"

              else

                7z a \
                  -v2g \
                  "upload/${BASENAME}.7z" \
                  "$FILE"

              fi

            else

              if [ -n "$PASS" ]; then

                echo "Password protected archive"

                7z a \
                  -p"$PASS" \
                  -mhe=on \
                  "upload/${BASENAME}.7z" \
                  "$FILE"

              else

                cp "$FILE" "upload/$BASENAME"

              fi

            fi

          done

      - name: Cleanup Empty Files
        shell: bash
        run: |
          find upload -type f -empty -delete

      - name: Generate Release Info
        id: meta
        shell: bash
        run: |
          TAG="run-$(date +%Y%m%d-%H%M%S)"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          {
            echo "# Download Report"
            echo ""

            echo "## Successful Downloads"

            while read LINE; do
              [ -n "$LINE" ] && echo "- $LINE"
            done < upload/success.txt

            echo ""

            echo "## Failed Downloads"

            while read LINE; do
              [ -n "$LINE" ] && echo "- $LINE"
            done < upload/failed.txt

            echo ""

            echo "## Uploaded Files"

            for FILE in upload/*; do
              [ -f "$FILE" ] && echo "- $(basename "$FILE")"
            done

          } > body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Download ${{ steps.meta.outputs.tag }}
          body_path: body.md
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
