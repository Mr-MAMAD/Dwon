name: Video Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Video URLs (one per line)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget jq
          mkdir -p downloads

      - name: Download
        shell: bash
        run: |
          set +e
          
          echo "${{ github.event.inputs.urls }}" | while IFS= read -r url; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            
            echo "=========================================="
            echo "Processing: $url"
            echo "=========================================="
            
            if echo "$url" | grep -q "vidara.so"; then
              echo "Site: vidara.so"
              
              PAGE=$(curl -s -L "$url" \
                -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -H "Referer: https://vidara.so/")
              
              # Extract video source
              VIDEO_URL=$(echo "$PAGE" | grep -oP 'src="https?://[^"]*(?:mp4|m3u8)[^"]*"' | head -1 | grep -oP 'src="\K[^"]*')
              [ -z "$VIDEO_URL" ] && VIDEO_URL=$(echo "$PAGE" | grep -oP "source src='([^']*)'" | head -1 | grep -oP "'\K[^']*")
              [ -z "$VIDEO_URL" ] && VIDEO_URL=$(echo "$PAGE" | grep -oP 'https?://[^"'"'"'<>]*\.(mp4|m3u8)[^"'"'"'<>]*' | head -1)
              
              if [ -z "$VIDEO_URL" ]; then
                echo "Trying to extract from script..."
                VIDEO_URL=$(echo "$PAGE" | grep -oP 'file:\s*"([^"]*)"' | head -1 | grep -oP '"([^"]*)"' | tr -d '"')
              fi
              
              [ -z "$VIDEO_URL" ] && VIDEO_URL=$(echo "$PAGE" | grep -oP 'videoUrl["\s:=]+["\s]*([^"'\''\s]+)' | head -1 | grep -oP '["\s]*\K[^"'\''\s]+' | tail -1)
              
              NAME=$(echo "$url" | grep -oP '/v/\K[^?]+' | head -1)
              [ -z "$NAME" ] && NAME="vidara_$(date +%s)"
              FILENAME="${NAME}.mp4"
              
            elif echo "$url" | grep -q "playmogo.com"; then
              echo "Site: playmogo.com"
              
              PAGE=$(curl -s -L "$url" \
                -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -H "Referer: https://playmogo.com/")
              
              # Extract video source
              VIDEO_URL=$(echo "$PAGE" | grep -oP 'src="https?://[^"]*(?:mp4|m3u8)[^"]*"' | head -1 | grep -oP 'src="\K[^"]*')
              [ -z "$VIDEO_URL" ] && VIDEO_URL=$(echo "$PAGE" | grep -oP "source src='([^']*)'" | head -1 | grep -oP "'\K[^']*")
              [ -z "$VIDEO_URL" ] && VIDEO_URL=$(echo "$PAGE" | grep -oP 'https?://[^"'"'"'<>]*\.(mp4|m3u8)[^"'"'"'<>]*' | head -1)
              [ -z "$VIDEO_URL" ] && VIDEO_URL=$(echo "$PAGE" | grep -oP 'file:\s*"([^"]*)"' | head -1 | grep -oP '"([^"]*)"' | tr -d '"')
              
              NAME=$(echo "$url" | grep -oP '/d/\K[^?]+' | head -1)
              [ -z "$NAME" ] && NAME="playmogo_$(date +%s)"
              FILENAME="${NAME}.mp4"
              
            else
              echo "Unknown site!"
              continue
            fi
            
            if [ -z "$VIDEO_URL" ]; then
              echo "ERROR: Could not find video URL"
              echo "Page snippet:"
              echo "$PAGE" | grep -iE "video|source|mp4|m3u8|file" | head -20
              continue
            fi
            
            echo "Video URL: $VIDEO_URL"
            echo "Saving as: $FILENAME"
            echo ""
            echo "Downloading..."
            
            if echo "$VIDEO_URL" | grep -q "\.m3u8"; then
              # HLS stream - use ffmpeg
              echo "HLS stream detected..."
              ffmpeg -i "$VIDEO_URL" \
                -c copy \
                -bsf:a aac_adtstoasc \
                "downloads/$FILENAME" 2>&1 || {
                  # Fallback with curl
                  curl -L "$VIDEO_URL" \
                    -H "User-Agent: Mozilla/5.0" \
                    -H "Referer: $url" \
                    -o "downloads/${NAME}.m3u8" 2>&1
                }
            else
              # Direct download
              curl -L "$VIDEO_URL" \
                -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -H "Referer: $url" \
                -o "downloads/$FILENAME" \
                --progress-bar \
                2>&1
            fi
            
            if [ -f "downloads/$FILENAME" ]; then
              SIZE=$(stat -c%s "downloads/$FILENAME" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 102400 ]; then
                echo "SUCCESS: $FILENAME ($(numfmt --to=iec $SIZE))"
              else
                echo "FAILED: File too small ($SIZE bytes)"
                rm -f "downloads/$FILENAME"
              fi
            fi
            
            echo ""
            echo "Done!"
            echo ""
          done
          
          echo ""
          echo "=========================================="
          echo "All downloads:"
          ls -lh downloads/ 2>/dev/null || echo "No files"
      
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: video-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
