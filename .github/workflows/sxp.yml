name: sxp with Cookie Support

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (هر خط یک لینک)'
        required: true
        type: string
      cookies:
        description: 'کوکی‌ها (مثلاً: session_id=abc; token=xyz)'
        required: false
        default: ''
        type: string
      referer:
        description: 'رفرر (آدرس صفحه‌ای که لینک رو ازش گرفتی)'
        required: false
        default: ''
        type: string
      connections:
        description: 'تعداد اتصال موازی (پیش‌فرض: 8)'
        required: false
        default: '8'
        type: string

jobs:
  download-with-cookie:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install aria2 and curl
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 curl

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download files
        id: download
        run: |
          mapfile -t URL_ARRAY <<< "${{ github.event.inputs.urls }}"
          
          COOKIES="${{ github.event.inputs.cookies }}"
          REFERER="${{ github.event.inputs.referer }}"
          CONNECTIONS="${{ github.event.inputs.connections }}"
          
          SUCCESS_COUNT=0
          FAILED_LIST=""
          TOTAL_SIZE=0
          
          for url in "${URL_ARRAY[@]}"; do
            url=$(echo "$url" | xargs)
            if [ -z "$url" ]; then
              continue
            fi
            
            echo "=========================================="
            echo "🔗 دانلود: ${url:0:100}..."
            echo "=========================================="
            
            # استخراج نام فایل
            filename=$(basename "$url" | cut -d'?' -f1 | cut -d'#' -f1 | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            if [ -z "$filename" ] || [ ${#filename} -lt 5 ]; then
              filename="download_$(date +%s%N | sha256sum | head -c 8).mp4"
            fi
            
            # جلوگیری از overwrite
            original="$filename"
            counter=1
            while [ -f "downloads/$filename" ]; do
              base="${original%.*}"
              ext="${original##*.}"
              filename="${base}_${counter}.${ext}"
              counter=$((counter + 1))
            done
            
            echo "📁 نام فایل: $filename"
            
            # ساخت هدرها
            HEADER_OPTS=(
              --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
              --header="Accept: */*"
              --header="Accept-Language: en-US,en;q=0.9"
              --header="Accept-Encoding: identity;q=1, *;q=0"
              --header="Connection: keep-alive"
              --header="Cache-Control: no-cache"
              --header="Pragma: no-cache"
              --header="Sec-Fetch-Dest: video"
              --header="Sec-Fetch-Mode: no-cors"
              --header="Sec-Fetch-Site: cross-site"
            )
            
            # اضافه کردن رفرر
            if [ -n "$REFERER" ]; then
              echo "🔗 رفرر: $REFERER"
              HEADER_OPTS+=(--referer="$REFERER")
              HEADER_OPTS+=(--header="Referer: $REFERER")
            else
              # رفرر خودکار
              DOMAIN=$(echo "$url" | grep -oP '^https?://[^/]+')
              HEADER_OPTS+=(--referer="$DOMAIN/")
            fi
            
            # اضافه کردن کوکی
            if [ -n "$COOKIES" ]; then
              echo "🍪 کوکی: ${COOKIES:0:50}..."
              HEADER_OPTS+=(--header="Cookie: $COOKIES")
            fi
            
            echo "🚀 شروع دانلود با $CONNECTIONS اتصال..."
            
            # دانلود با aria2
            aria2c \
              "$url" \
              --out="downloads/$filename" \
              --max-connection-per-server="$CONNECTIONS" \
              --split="$CONNECTIONS" \
              --min-split-size=1M \
              --connect-timeout=30 \
              --timeout=600 \
              --max-tries=3 \
              --retry-wait=5 \
              --continue=true \
              --allow-overwrite=false \
              --auto-file-renaming=false \
              --file-allocation=none \
              --disk-cache=64M \
              --summary-interval=5 \
              --console-log-level=notice \
              "${HEADER_OPTS[@]}" \
              2>&1 | tee "/tmp/aria2_$counter.log"
            
            ARIA_EXIT=${PIPESTATUS[0]}
            
            # اگر aria2 ناموفق بود، با curl امتحان کن
            if [ $ARIA_EXIT -ne 0 ] || [ ! -f "downloads/$filename" ] || [ $(stat -c%s "downloads/$filename" 2>/dev/null || echo 0) -lt 10240 ]; then
              echo "⚠️ aria2 ناموفق - تلاش با curl..."
              
              CURL_HEADERS=(
                -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                -H "Accept: */*"
                -H "Connection: keep-alive"
              )
              
              [ -n "$REFERER" ] && CURL_HEADERS+=(-H "Referer: $REFERER") && CURL_HEADERS+=(--referer "$REFERER")
              [ -n "$COOKIES" ] && CURL_HEADERS+=(-H "Cookie: $COOKIES")
              
              curl -L \
                "${CURL_HEADERS[@]}" \
                --connect-timeout 30 \
                --max-time 600 \
                -o "downloads/$filename" \
                "$url" 2>&1 | tail -5
              
              CURL_EXIT=$?
            fi
            
            # بررسی نتیجه
            if [ -f "downloads/$filename" ]; then
              SIZE=$(stat -c%s "downloads/$filename" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 10240 ]; then
                echo "✅ موفق: $filename ($(numfmt --to=iec $SIZE))"
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
              else
                echo "❌ حجم کم: ${SIZE} بایت - حذف"
                cat "downloads/$filename" 2>/dev/null | head -c 200
                rm -f "downloads/$filename"
                FAILED_LIST="$FAILED_LIST\n- $url (حجم غیرعادی: ${SIZE} بایت)"
              fi
            else
              echo "❌ دانلود نشد"
              FAILED_LIST="$FAILED_LIST\n- $url (فایل ایجاد نشد)"
            fi
            
            echo ""
          done
          
          echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "TOTAL_SIZE=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          
          # ایجاد گزارش
          {
            echo "# 📊 گزارش دانلود با کوکی"
            echo ""
            echo "**زمان:** $(date '+%Y-%m-%d %H:%M:%S')"
            echo ""
            echo "| مورد | مقدار |"
            echo "|------|-------|"
            echo "| دانلود موفق | $SUCCESS_COUNT |"
            echo "| حجم کل | $(numfmt --to=iec $TOTAL_SIZE) |"
            echo "| رفرر | ${REFERER:-خودکار} |"
            echo "| کوکی | $([ -n "$COOKIES" ] && echo "✅ تنظیم شده" || echo "❌ وارد نشده") |"
            echo ""
            
            if [ $SUCCESS_COUNT -gt 0 ]; then
              echo "## ✅ فایل‌ها"
              echo ""
              for f in downloads/*; do
                [ -f "$f" ] && echo "- 📁 \`$(basename "$f")\` ($(numfmt --to=iec $(stat -c%s "$f")))"
              done
            fi
            
            if [ -n "$FAILED_LIST" ]; then
              echo ""
              echo "## ❌ خطاها"
              echo -e "$FAILED_LIST"
            fi
          } > download_report.md
          
          if [ "$SUCCESS_COUNT" -eq 0 ]; then
            echo "❌ هیچ فایلی دانلود نشد!"
            exit 1
          fi

      - name: Create Release
        if: steps.download.outputs.SUCCESS_COUNT != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cookie-download-${{ github.run_number }}
          name: 🍪 Download with Cookie #${{ github.run_number }}
          body_path: download_report.md
          files: |
            downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cookie-download-logs-${{ github.run_number }}
          path: |
            /tmp/aria2_*.log
            download_report.md
          retention-days: 3
