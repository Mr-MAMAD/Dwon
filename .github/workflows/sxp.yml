name: Magnet Downloader

on:
  workflow_dispatch:
    inputs:
      magnets:
        description: 'Magnet links (one per line)'
        required: true
        type: string
      split_size:
        description: 'Split size (e.g., 1900M)'
        required: false
        default: '1900M'
        type: string
      timeout:
        description: 'Timeout minutes per magnet'
        required: false
        default: '15'
        type: string
      connections:
        description: 'Connections (1-16)'
        required: false
        default: '8'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install aria2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 curl
      
      - name: Download
        id: dl
        shell: bash
        run: |
          set +e
          
          MAGNETS="${{ github.event.inputs.magnets }}"
          SPLIT="${{ github.event.inputs.split_size }}"
          TIMEOUT_MIN="${{ github.event.inputs.timeout }}"
          TIMEOUT_SEC=$((TIMEOUT_MIN * 60))
          CONN="${{ github.event.inputs.connections }}"
          
          SUCCESS=0
          TOTAL=0
          INDEX=0
          FAILED=""
          
          mkdir -p downloads splitted
          
          while IFS= read -r magnet; do
            magnet=$(echo "$magnet" | xargs)
            [ -z "$magnet" ] && continue
            
            INDEX=$((INDEX + 1))
            
            echo "=========================================="
            echo "[$INDEX] Downloading..."
            echo "=========================================="
            
            FILENAME=$(echo "$magnet" | grep -oP 'dn=\K[^&]+' 2>/dev/null | python3 -c "import sys,urllib.parse;print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null)
            [ -z "$FILENAME" ] && FILENAME="download_${INDEX}.mp4"
            
            CLEAN=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            BASE="${CLEAN%.*}"
            
            echo "File: $CLEAN"
            echo "Timeout: ${TIMEOUT_MIN}min"
            echo ""
            
            aria2c "$magnet" \
              -d downloads \
              -o "$CLEAN" \
              --seed-time=0 \
              --bt-max-peers=100 \
              --split="$CONN" \
              --enable-dht=true \
              --bt-stop-timeout=120 \
              --timeout=60 \
              --max-tries=0 \
              --console-log-level=notice \
              --summary-interval=15 \
              2>&1 | tee "/tmp/log_${INDEX}.txt" &
            
            PID=$!
            START=$(date +%s)
            LAST=0
            STUCK=0
            
            while kill -0 $PID 2>/dev/null; do
              NOW=$(date +%s)
              ELAPSED=$((NOW - START))
              
              if [ "$ELAPSED" -gt "$TIMEOUT_SEC" ]; then
                echo "Timeout!"
                kill -9 $PID 2>/dev/null
                break
              fi
              
              if [ -f "downloads/$CLEAN" ]; then
                SIZE=$(stat -c%s "downloads/$CLEAN" 2>/dev/null || echo 0)
                if [ "$SIZE" -eq "$LAST" ] && [ "$ELAPSED" -gt 120 ] && [ "$SIZE" -gt 0 ]; then
                  STUCK=$((STUCK + 1))
                  [ "$STUCK" -gt 12 ] && { echo "Stuck!"; kill -9 $PID 2>/dev/null; break; }
                else
                  STUCK=0
                fi
                LAST=$SIZE
              fi
              
              sleep 10
            done
            
            wait $PID 2>/dev/null
            
            FILE="downloads/$CLEAN"
            [ ! -f "$FILE" ] && FILE=$(find downloads -newer "/tmp/log_${INDEX}.txt" -size +100k 2>/dev/null | head -1)
            
            if [ -f "$FILE" ]; then
              SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
              
              if [ "$SIZE" -gt 102400 ]; then
                echo "✅ $(basename "$FILE") ($(numfmt --to=iec $SIZE))"
                
                if [ "$SIZE" -gt 2147483648 ]; then
                  echo "Splitting..."
                  DIR="splitted/${BASE}"
                  mkdir -p "$DIR"
                  split -d -b "$SPLIT" "$FILE" "${DIR}/${BASE}.part"
                  md5sum "$FILE" > "$DIR/checksum.md5"
                  
                  cat > "$DIR/README.md" << EOF
File: $CLEAN
Size: $(numfmt --to=iec $SIZE)
Parts: $(ls "$DIR"/*.part* | wc -l)

Join: cat part* > $CLEAN
Verify: md5sum -c checksum.md5
EOF
                  rm -f "$FILE"
                else
                  cp "$FILE" "splitted/$CLEAN"
                fi
                
                SUCCESS=$((SUCCESS + 1))
                TOTAL=$((TOTAL + SIZE))
              else
                echo "❌ Too small: $SIZE bytes"
                rm -f "$FILE"
                FAILED="$FAILED\n- $CLEAN (${SIZE} bytes)"
              fi
            else
              echo "❌ No seeders"
              FAILED="$FAILED\n- $CLEAN (no seeders)"
            fi
            
            echo ""
          done <<< "$MAGNETS"
          
          echo "SUCCESS=$SUCCESS" >> $GITHUB_OUTPUT
          
          {
            echo "# Report"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Success | $SUCCESS/$INDEX |"
            echo "| Size | $(numfmt --to=iec $TOTAL) |"
            echo ""
            
            [ $SUCCESS -gt 0 ] && echo "## Files" && ls -lh splitted/
            [ -n "$FAILED" ] && echo -e "\n## Failed\n$FAILED"
          } > report.md
          
          [ "$SUCCESS" -eq 0 ] && exit 1
      
      - name: Release
        if: steps.dl.outputs.SUCCESS != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dl-${{ github.run_number }}
          files: splitted/**/*
          body_path: report.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: /tmp/log_*.txt
          retention-days: 3
