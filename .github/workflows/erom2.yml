name: Erome Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Direct video URLs (one per line)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl
          mkdir -p downloads

      - name: Download
        shell: bash
        run: |
          success=0
          total=0
          
          while IFS= read -r url; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            total=$((total+1))
            
            echo "=========================================="
            echo "[$total] Downloading: $url"
            echo "=========================================="
            
            # Extract filename from URL
            filename=$(basename "$url" | cut -d'?' -f1)
            [ -z "$filename" ] && filename="video_${total}.mp4"
            
            echo "Saving as: $filename"
            
            # Download with Referer header
            curl -L \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -H "Referer: https://www.erome.com/" \
              -H "Origin: https://www.erome.com" \
              --connect-timeout 30 \
              --max-time 600 \
              -o "downloads/$filename" \
              "$url" 2>&1 || {
                echo "❌ Failed: $url"
                continue
              }
            
            # Verify
            if [ -f "downloads/$filename" ]; then
              size=$(stat -c%s "downloads/$filename" 2>/dev/null || echo 0)
              if [ "$size" -gt 102400 ]; then
                echo "✅ Downloaded: $filename ($(numfmt --to=iec $size))"
                success=$((success+1))
              else
                echo "❌ File too small ($size bytes)"
                rm -f "downloads/$filename"
              fi
            fi
            echo ""
          done <<< "${{ github.event.inputs.urls }}"
          
          echo ""
          echo "=========================================="
          echo "Done! Downloaded $success/$total files"
          echo "=========================================="
          ls -lh downloads/
          
          if [ $success -eq 0 ]; then
            echo "No files downloaded!"
            exit 1
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: erome-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
