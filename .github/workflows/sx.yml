name: sx Downloader (Smart Split)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Video URLs (space or newline separated)'
        required: true
        type: string
      referer:
        description: 'Referer URL'
        required: false
        type: string
        default: 'https://trafficdeposit.com/'
      origin:
        description: 'Origin URL'
        required: false
        type: string
        default: 'https://trafficdeposit.com'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget aria2
          mkdir -p downloads

      - name: Download
        shell: bash
        run: |
          success=0
          total=0
          failed_urls=""

          REFERER="${{ github.event.inputs.referer }}"
          ORIGIN="${{ github.event.inputs.origin }}"

          echo "🔗 Referer: $REFERER"
          echo "🔗 Origin: $ORIGIN"
          echo ""

          while IFS= read -r url; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue

            if ! echo "$url" | grep -qE '^https?://'; then
              echo "⚠️ رد کردن آدرس نامعتبر: $url"
              failed_urls="${failed_urls}${url} (نامعتبر)\n"
              continue
            fi

            total=$((total+1))

            echo "=========================================="
            echo "[$total] در حال دانلود: $url"
            echo "=========================================="

            # استخراج نام فایل با پسوند
            if echo "$url" | grep -qi '\.vid$'; then
              filename="video_${total}.mp4"
            elif echo "$url" | grep -q '\.mp4$'; then
              filename=$(basename "$url" | cut -d'?' -f1)
            else
              # تلاش برای تشخیص پسوند از URL
              base_name=$(echo "$url" | sed 's/\?.*//' | xargs basename)
              if echo "$base_name" | grep -q '\.'; then
                filename="$base_name"
              else
                filename="video_${total}.mp4"
              fi
            fi

            echo "📁 ذخیره به عنوان: $filename"
            download_failed=false

            # روش 1: aria2c با تنظیمات کامل
            echo "🔄 تلاش با aria2c..."
            if aria2c \
              --max-connection-per-server=4 \
              --split=4 \
              --min-split-size=1M \
              --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --header="Referer: $REFERER" \
              --header="Origin: $ORIGIN" \
              --header="Accept: */*" \
              --header="Accept-Encoding: identity" \
              --header="Connection: keep-alive" \
              --header="Sec-Fetch-Dest: video" \
              --header="Sec-Fetch-Mode: no-cors" \
              --header="Sec-Fetch-Site: cross-site" \
              --header="Range: bytes=0-" \
              --timeout=60 \
              --retry-wait=5 \
              --max-tries=5 \
              --dir=downloads \
              --out="$filename" \
              "$url" 2>&1 | tee aria2c_output.log; then
              echo "✅ aria2c اجرا شد"
            else
              echo "⚠️ aria2c شکست خورد، تلاش با curl..."
              
              # روش 2: curl با تنظیمات پیشرفته
              if curl -v -L \
                --connect-timeout 30 \
                --max-time 600 \
                --retry 5 \
                --retry-delay 10 \
                --retry-max-time 300 \
                -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                -H "Referer: $REFERER" \
                -H "Origin: $ORIGIN" \
                -H "Accept: */*" \
                -H "Accept-Encoding: identity;q=1, *;q=0" \
                -H "Accept-Language: en-US,en;q=0.9" \
                -H "Connection: keep-alive" \
                -H "Sec-Fetch-Dest: video" \
                -H "Sec-Fetch-Mode: no-cors" \
                -H "Sec-Fetch-Site: cross-site" \
                -H "Range: bytes=0-" \
                -H "Cache-Control: no-cache" \
                -H "Pragma: no-cache" \
                --compressed \
                -o "downloads/$filename" \
                "$url" 2>&1 | tee curl_output.log; then
                echo "✅ curl اجرا شد"
              else
                echo "⚠️ curl شکست خورد، تلاش با wget..."
                
                # روش 3: wget
                if wget \
                  --timeout=60 \
                  --tries=5 \
                  --retry-connrefused \
                  --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                  --referer="$REFERER" \
                  --header="Origin: $ORIGIN" \
                  --header="Range: bytes=0-" \
                  -O "downloads/$filename" \
                  "$url" 2>&1; then
                  echo "✅ wget اجرا شد"
                else
                  download_failed=true
                  echo "❌ همه روش‌ها شکست خوردند"
                fi
              fi
            fi

            # بررسی فایل دانلود شده
            if [ "$download_failed" = true ] || [ ! -f "downloads/$filename" ]; then
              echo "❌ خطا در دانلود: $url"
              
              # نمایش لاگ‌ها برای دیباگ
              echo "=== aria2c log ==="
              cat aria2c_output.log 2>/dev/null | tail -20
              echo "=== curl log ==="
              cat curl_output.log 2>/dev/null | tail -20
              
              failed_urls="${failed_urls}${url} (خطای دانلود)\n"
              continue
            fi

            if [ -f "downloads/$filename" ]; then
              size=$(stat -c%s "downloads/$filename" 2>/dev/null || echo 0)
              if [ "$size" -gt 1024 ]; then
                echo "✅ دانلود شد: $filename ($(numfmt --to=iec $size 2>/dev/null || echo "${size} bytes"))"
                success=$((success+1))
              else
                echo "❌ فایل خیلی کوچک است ($size بایت)"
                echo "محتوای فایل (hex):"
                xxd "downloads/$filename" | head -5
                failed_urls="${failed_urls}${url} (فایل کوچک: ${size} بایت)\n"
                rm -f "downloads/$filename"
              fi
            else
              echo "❌ فایل ایجاد نشد: $filename"
              failed_urls="${failed_urls}${url} (فایل ذخیره نشد)\n"
            fi
            echo ""
          done < <(echo "${{ github.event.inputs.urls }}" | tr ' ' '\n')

          echo ""
          echo "=========================================="
          echo "📊 گزارش نهایی"
          echo "=========================================="
          echo "کل لینک‌ها: $total"
          echo "موفق: $success"
          echo "ناموفق: $((total - success))"
          echo ""

          if [ -n "$failed_urls" ]; then
            echo "❌ لینک‌های دانلود نشده:"
            echo -e "$failed_urls"
          fi

          echo ""
          echo "فایل‌های دانلود شده:"
          ls -lh downloads/ 2>/dev/null || echo "هیچ فایلی موجود نیست"

          if [ $success -eq 0 ]; then
            echo ""
            echo "⛔ هیچ فایلی دانلود نشد!"
            exit 1
          fi

      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sx-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
