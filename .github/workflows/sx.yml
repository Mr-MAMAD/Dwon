name: sx Downloader (Smart Split)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Video URLs (space or newline separated)'
        required: true
        type: string
      referer:
        description: 'Referer URL (پیش‌فرض: https://trafficdeposit.com/)'
        required: false
        type: string
        default: 'https://sxyprn.com/'
      origin:
        description: 'Origin URL (پیش‌فرض: https://trafficdeposit.com)'
        required: false
        type: string
        default: 'https://sxyprn.com'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Setup environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget
          mkdir -p downloads

      - name: Download videos
        shell: bash
        run: |
          success=0
          total=0
          
          REFERER="${{ github.event.inputs.referer }}"
          ORIGIN="${{ github.event.inputs.origin }}"
          
          echo "Referer: $REFERER"
          echo "Origin: $ORIGIN"
          echo ""

          # تبدیل URL ها به خطوط جداگانه
          echo "${{ github.event.inputs.urls }}" | tr ' ' '\n' | while IFS= read -r url; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            
            if ! echo "$url" | grep -qE '^https?://'; then
              echo "⚠️ رد کردن آدرس نامعتبر: $url"
              continue
            fi

            total=$((total + 1))
            
            echo "=========================================="
            echo "[$total] دانلود: $url"
            echo "=========================================="

            # نام فایل
            filename="video_${total}.mp4"
            echo "ذخیره به عنوان: $filename"

            # دانلود با curl
            curl -L \
              --max-time 300 \
              --retry 3 \
              --retry-delay 5 \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -H "Referer: $REFERER" \
              -H "Origin: $ORIGIN" \
              -H "Accept: */*" \
              -o "downloads/$filename" \
              "$url" || {
                echo "❌ curl failed, trying wget..."
                wget --timeout=60 --tries=3 \
                  --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                  --referer="$REFERER" \
                  -O "downloads/$filename" \
                  "$url" || {
                    echo "❌ دانلود ناموفق"
                    continue
                  }
              }

            # بررسی فایل
            if [ -f "downloads/$filename" ]; then
              size=$(stat -c%s "downloads/$filename" 2>/dev/null || echo 0)
              if [ "$size" -gt 10240 ]; then
                echo "✅ موفق: $filename ($(numfmt --to=iec $size))"
                success=$((success + 1))
              else
                echo "❌ فایل کوچک: $size بایت"
                rm -f "downloads/$filename"
              fi
            fi
            echo ""
          done

          echo ""
          echo "=========================================="
          echo "فایل‌های دانلود شده:"
          ls -lh downloads/ 2>/dev/null || echo "هیچ فایلی موجود نیست"
          
          # چک کردن حداقل یک فایل موفق
          if [ $(ls -1 downloads/ 2>/dev/null | wc -l) -eq 0 ]; then
            echo "⛔ هیچ فایلی دانلود نشد!"
            exit 1
          fi

      - name: Upload to release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: download-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
