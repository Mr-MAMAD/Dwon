name: sx Downloader (Smart Split)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Video URLs (space or newline separated)'
        required: true
        type: string
      referer:
        description: 'Referer URL (e.g. https://example.com/)'
        required: false
        type: string
        default: ''
      origin:
        description: 'Origin URL (e.g. https://example.com)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl
          mkdir -p downloads

      - name: Download
        shell: bash
        run: |
          success=0
          total=0
          failed_urls=""

          # گرفتن Referer و Origin از ورودی‌ها
          REFERER="${{ github.event.inputs.referer }}"
          ORIGIN="${{ github.event.inputs.origin }}"

          # اگر خالی بودن، مقدار پیش‌فرض خالی بمونه
          [ -z "$REFERER" ] && REFERER=""
          [ -z "$ORIGIN" ] && ORIGIN=""

          echo "🔗 Referer: ${REFERER:-'تنظیم نشده'}"
          echo "🔗 Origin: ${ORIGIN:-'تنظیم نشده'}"
          echo ""

          while IFS= read -r url; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue

            if ! echo "$url" | grep -qE '^https?://'; then
              echo "⚠️ رد کردن آدرس نامعتبر: $url"
              failed_urls="${failed_urls}${url} (نامعتبر)\n"
              continue
            fi

            total=$((total+1))

            echo "=========================================="
            echo "[$total] در حال دانلود: $url"
            echo "=========================================="

            # استخراج نام فایل از پارامتر file اگر وجود داشته باشد
            if echo "$url" | grep -q 'file='; then
              file_param=$(echo "$url" | sed -n 's/.*file=\([^&]*\).*/\1/p' | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))")
              filename=$(basename "$file_param")
            else
              filename=$(basename "$url" | cut -d'?' -f1)
            fi

            [ -z "$filename" ] && filename="video_${total}.mp4"
            echo "ذخیره به عنوان: $filename"

            download_failed=false

            # ساخت دستور curl با هدرهای دلخواه
            CURL_CMD="curl -L --connect-timeout 30 -o \"downloads/$filename\""
            CURL_CMD="$CURL_CMD -H \"User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36\""
            
            [ -n "$REFERER" ] && CURL_CMD="$CURL_CMD -H \"Referer: $REFERER\""
            [ -n "$ORIGIN" ] && CURL_CMD="$CURL_CMD -H \"Origin: $ORIGIN\""
            
            CURL_CMD="$CURL_CMD \"$url\" 2>&1"

            eval $CURL_CMD || download_failed=true

            if [ "$download_failed" = true ]; then
              echo "❌ خطا در دانلود: $url"
              failed_urls="${failed_urls}${url} (خطای curl)\n"
              continue
            fi

            if [ -f "downloads/$filename" ]; then
              size=$(stat -c%s "downloads/$filename" 2>/dev/null || echo 0)
              if [ "$size" -gt 102400 ]; then
                echo "✅ دانلود شد: $filename ($(numfmt --to=iec $size))"
                success=$((success+1))
              else
                echo "❌ فایل خیلی کوچک است ($size بایت)"
                failed_urls="${failed_urls}${url} (فایل کوچک: ${size} بایت)\n"
                rm -f "downloads/$filename"
              fi
            else
              echo "❌ فایل ایجاد نشد: $filename"
              failed_urls="${failed_urls}${url} (فایل ذخیره نشد)\n"
            fi
            echo ""
          done < <(echo "${{ github.event.inputs.urls }}" | tr ' ' '\n')

          echo ""
          echo "=========================================="
          echo "📊 گزارش نهایی"
          echo "=========================================="
          echo "کل لینک‌های معتبر: $total"
          echo "دانلود موفق: $success"
          echo "دانلود ناموفق: $((total - success))"
          echo ""

          if [ -n "$failed_urls" ]; then
            echo "❌ لینک‌های دانلود نشده:"
            echo "=========================================="
            echo -e "$failed_urls"
            echo "=========================================="
          fi

          echo ""
          echo "فایل‌های دانلود شده:"
          ls -lh downloads/ 2>/dev/null || echo "هیچ فایلی موجود نیست"

          if [ $success -eq 0 ]; then
            echo ""
            echo "⛔ هیچ فایلی با موفقیت دانلود نشد!"
            exit 1
          fi

      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: erome-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
