name: Download and Release

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (با کاما جدا کن)'
        required: true
        default: 'https://cdn5.yesporn.vip/remote_control.php?time=1780168713&cv=2a963ddaceba7ad2b6e30c155403c0fc&lr=0&cv2=042115bccb6a5549ab7828a289c2b98c&file=%2F69000%2F69951%2F69951.mp4&cv3=c8e86ed5d98c30026dd57f5a89acbdad&cv4=b05adadd731ded162e2c96b36258fae1'

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download files
        id: download
        run: |
          IFS=',' read -ra URL_ARRAY <<< "${{ github.event.inputs.urls }}"
          
          SUCCESS_COUNT=0
          FAILED_URLS=""
          DOWNLOADED_FILES=""
          
          for url in "${URL_ARRAY[@]}"; do
            # حذف فاصله‌های اضافی
            url=$(echo "$url" | xargs)
            
            echo "----------------------------------------"
            echo "تلاش برای دانلود: $url"
            
            # استخراج نام فایل از URL
            filename=$(basename "$url" | cut -d'?' -f1)
            if [ -z "$filename" ] || [ "$filename" = "/" ]; then
              filename="file_$(date +%s)_$((RANDOM % 1000)).mp4"
            fi
            
            # جلوگیری از overwrite با اضافه کردن شمارنده
            if [ -f "downloads/$filename" ]; then
              base="${filename%.*}"
              ext="${filename##*.}"
              counter=1
              while [ -f "downloads/${base}_${counter}.${ext}" ]; do
                counter=$((counter + 1))
              done
              filename="${base}_${counter}.${ext}"
            fi
            
            # دانلود با تنظیم User-Agent و دنبال کردن redirectها
            if curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                    --connect-timeout 30 \
                    --max-time 600 \
                    -o "downloads/$filename" \
                    -w "\nHTTP_CODE:%{http_code}\n" \
                    "$url" 2>&1 | tee /tmp/curl_output.txt; then
              
              HTTP_CODE=$(grep "HTTP_CODE:" /tmp/curl_output.txt | cut -d':' -f2)
              
              # بررسی HTTP status
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "206" ]; then
                # بررسی سایز فایل
                FILE_SIZE=$(stat -c%s "downloads/$filename" 2>/dev/null || echo 0)
                if [ "$FILE_SIZE" -gt 10240 ]; then
                  echo "✅ دانلود موفق: $filename (سایز: $(numfmt --to=iec $FILE_SIZE))"
                  SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                  DOWNLOADED_FILES="$DOWNLOADED_FILES,$filename"
                else
                  echo "⚠️ فایل خیلی کوچک است (${FILE_SIZE} بایت) - احتمالاً خراب"
                  rm -f "downloads/$filename"
                  FAILED_URLS="$FAILED_URLS\n- $url (فایل خیلی کوچک)"
                fi
              else
                echo "❌ خطای HTTP: $HTTP_CODE"
                rm -f "downloads/$filename"
                FAILED_URLS="$FAILED_URLS\n- $url (HTTP $HTTP_CODE)"
              fi
            else
              echo "❌ دانلود ناموفق"
              rm -f "downloads/$filename"
              FAILED_URLS="$FAILED_URLS\n- $url (خطای دانلود)"
            fi
          done
          
          echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "DOWNLOADED_FILES=$DOWNLOADED_FILES" >> $GITHUB_OUTPUT
          
          # ذخیره گزارش خطاها
          if [ -n "$FAILED_URLS" ]; then
            echo -e "## گزارش خطاها\n$FAILED_URLS" > download_report.md
          else
            echo "## همه دانلودها موفق بودند ✅" > download_report.md
          fi
          
          echo "----------------------------------------"
          echo "تعداد دانلود موفق: $SUCCESS_COUNT"
          
          if [ "$SUCCESS_COUNT" -eq 0 ]; then
            echo "هیچ فایلی دانلود نشد!"
            exit 1
          fi

      - name: List downloaded files
        run: |
          echo "فایل‌های دانلود شده:"
          ls -lh downloads/

      - name: Create Release
        if: steps.download.outputs.SUCCESS_COUNT != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}-${{ github.run_attempt }}
          name: Release ${{ github.run_number }} (Attempt ${{ github.run_attempt }})
          body_path: download_report.md
          files: |
            downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: download-report
          path: download_report.md
